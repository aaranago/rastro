<style>
        body { font-family: 'DM Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        
        /* Candy micro-interactions */
        .bouncy-hover:hover {
            transform: scale(1.03);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bouncy-active:active {
            transform: scale(0.95);
        }
        
        /* Glassmorphism utility for Candy theme */
        .glass-candy {
            background: rgba(254, 247, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {
    font-size: 24px !important;
  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;
    bottom: 98px !important;
    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;
    background: var(--rastro-primary) !important;
    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {
    position: fixed !important;
    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: 0 !important;
  }
  [class*="rounded-\[2rem\]"],
  .rounded-lg,
  .rounded-xl {
    border-color: rgba(220,228,222,.95) !important;
  }
  main, section { scrollbar-width: none; }
  main::-webkit-scrollbar, section::-webkit-scrollbar, div::-webkit-scrollbar { display: none; }
</style>

<body class="bg-surface text-on-surface antialiased min-h-screen relative pb-32 overflow-x-hidden">
<!-- Custom Top Bar for Detail View (Task-Focused: Navigation Suppressed) -->
<header class="fixed top-0 left-0 right-0 z-50 p-4 flex justify-between items-center pointer-events-none">
<button class="w-12 h-12 rounded-full glass-candy flex items-center justify-center text-primary shadow-[0_4px_16px_rgba(20,108,90,0.15)] pointer-events-auto bouncy-hover bouncy-active cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<button class="w-12 h-12 rounded-full glass-candy flex items-center justify-center text-secondary shadow-[0_4px_16px_rgba(29,122,82,0.15)] pointer-events-auto bouncy-hover bouncy-active cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-weight="fill">share</span>
</button>
</header>
<!-- Hero Image Area (Photo of sighting) -->
<section class="relative w-full h-[397px]">
<!-- Blur layer for "blurry photo" effect implied by prompt, layered over the actual image -->
<div class="absolute inset-0 bg-secondary/10 backdrop-blur-[2px] z-10"></div>
<img class="absolute inset-0 w-full h-full object-cover object-center z-0" data-alt="A slightly blurry, spontaneous smartphone photo of a medium-sized brown dog trotting along a sunlit city sidewalk. The photo has a candid, slightly out-of-focus quality. The environment features warm, bright daytime lighting with vibrant, playful pops of color in the background, matching a joyful, energetic aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkrhgS-OiFLhjCcKXubJuTpeK9h8BvU6uoHHJ7ceQphkcSpTWhuRqkHRiCjIXo4bx5VzvUVp9YKEgXREaxKVCYbFsEz6GWmYHoEPDy9FdPtZ_VGCLHN9tbEIIoAy0EfdyH2nBuZ29XrV_zHknj0I748Dz1_R6f2R-trjXVLZJ56gqSKvc1oAx5zuA6I8JIIbrupWzVcsbcE3QX5zRsp3CxoSZjXqAI8Mdd2CFQ271dBkKh4dxMHfnVquzA_asEEtNZWUlBUJj7ga4"/>
<!-- Gradient overlay to blend into the content card -->
<div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-surface to-transparent z-10"></div>
</section>
<!-- Main Content Canvas -->
<main class="relative z-20 -mt-12 px-4 md:px-8 max-w-3xl mx-auto">
<!-- Primary Info Card -->
<div class="bg-surface-bright rounded-t-xl rounded-b-xl shadow-[0_-8px_32px_rgba(20,108,90,0.08)] p-6 md:p-8 pt-8 relative border border-white/60">
<!-- Floating Category Badge -->
<div class="absolute -top-5 left-6 shadow-[0_4px_12px_rgba(46,109,158,0.3)] bg-tertiary text-on-tertiary px-4 py-2 rounded-full flex items-center gap-2 border-2 border-surface-bright">
<span class="material-symbols-outlined text-sm">visibility</span>
<span class="font-bold text-xs tracking-widest uppercase">Avistamiento</span>
</div>
<!-- Headline -->
<h1 class="font-headline font-extrabold text-3xl md:text-4xl text-on-surface leading-tight mb-4 tracking-tight">
                Posible Bruno visto en Av. 14 de Septiembre
            </h1>
<!-- Hora & Distance Meta -->
<div class="flex flex-wrap items-center gap-4 mb-6">
<div class="flex items-center gap-2 bg-primary-fixed/40 text-on-primary-fixed px-3 py-1.5 rounded-full text-sm font-medium">
<span class="material-symbols-outlined text-[18px] text-primary">schedule</span>
                    Hace 15 minutos
                </div>
<div class="flex items-center gap-2 bg-secondary-container/50 text-on-secondary-container px-3 py-1.5 rounded-full text-sm font-medium">
<span class="material-symbols-outlined text-[18px] text-secondary">distance</span>
                    Aprox. 1.2 km de ti
                </div>
</div>
<hr class="border-surface-dim mb-6"/>
<!-- Detail Section: Observations -->
<div class="mb-8">
<h3 class="font-headline font-bold text-lg text-on-surface-variant mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-secondary">info</span>
                    Detalles Adicionales
                </h3>
<div class="bg-secondary-fixed-dim/20 p-5 rounded-lg border border-secondary-fixed-dim/30 relative overflow-hidden">
<!-- Decorative blob -->
<div class="absolute -right-8 -top-8 w-24 h-24 bg-secondary/10 rounded-full blur-xl"></div>
<p class="font-body text-on-surface text-lg relative z-10 leading-relaxed font-medium">
                        "Se dirigía hacia el puente"
                    </p>
</div>
</div>
<!-- Detail Section: Map -->
<div class="mb-4">
<h3 class="font-headline font-bold text-lg text-on-surface-variant mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary">location_on</span>
                    Ubicación Exacta
                </h3>
<div class="relative w-full h-56 rounded-xl overflow-hidden shadow-[0_8px_24px_rgba(46,109,158,0.15)] group cursor-pointer border-4 border-surface-bright">
<!-- Map Placeholder Image -->
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="A stylized, vibrantly colored digital map interface centered on a specific street. The map uses a joyful Candy theme palette with hot pink route highlights, soft purple accents, and sky blue water features. The overall style is clean and modern with rounded map elements and a prominent, bouncy drop pin indicating a sighting." data-location="Av. 14 de Septiembre, Cochabamba" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVVfhzSPXD7KYpiQetUfNC9pLCNbpFXjtEw7--NC8Y_8s39-imPOh0wneYFrdmuFRM11lvoUVNRC4uZ_szUZVAwUQ_rYWI3RE4XQsT1BHBNYugQGv96hQMFDj5ov6FZaIV9T0zUluXcpOPDmOGS4wkSI26lvdlYcLSxVxyAP919w3Kf-NT3u30zrlmUFch67gahA6mHNWIh3B21xyydTOPe4NcindfMCuk7ghJZU1DzoOCAOIpLXhGdlnfe39L07jIORcyH27kI1w"/>
<!-- Fake Map Pin overlay -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center drop-shadow-xl">
<div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-on-primary animate-bounce">
<span class="material-symbols-outlined" data-weight="fill">pets</span>
</div>
<div class="w-3 h-1 bg-black/20 rounded-[100%] mt-1 blur-[1px]"></div>
</div>
<!-- Overlay gradient for button legibility -->
<div class="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent"></div>
<button class="absolute bottom-3 right-3 bg-surface text-on-surface px-4 py-2 rounded-full text-sm font-bold shadow-lg flex items-center gap-2 bouncy-hover">
<span class="material-symbols-outlined text-[18px]">directions</span>
                        Cómo llegar
                    </button>
</div>
<p class="text-sm text-on-surface-variant mt-2 px-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">my_location</span>
                    Av. 14 de Septiembre esq. Calle innominada
                </p>
</div>
</div>
</main>
<!-- Floating Action Bar (Task Focused Primary Action) -->
<div class="fixed bottom-0 left-0 right-0 p-4 md:p-6 bg-gradient-to-t from-surface via-surface to-transparent z-40 pb-6 md:pb-8 flex justify-center pointer-events-none">
<button class="pointer-events-auto w-full max-w-md bg-primary text-on-primary shadow-[0_8px_24px_rgba(20,108,90,0.35)] rounded-full py-4 px-8 flex items-center justify-center gap-3 bouncy-hover bouncy-active group overflow-hidden relative">
<!-- Button sheen effect -->
<div class="absolute inset-0 w-1/2 h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[150%] skew-x-[-20deg] group-hover:animate-[sheen_1.5s_ease-in-out_infinite]"></div>
<span class="material-symbols-outlined text-2xl group-hover:rotate-12 transition-transform duration-300">chat_bubble</span>
<span class="font-headline font-bold text-lg tracking-wide">Informar al Dueño</span>
</button>
</div>
<style>
        @keyframes sheen {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(250%) skewX(-20deg); }
        }
    </style>
</body></html>
