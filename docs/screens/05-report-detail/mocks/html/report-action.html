<style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #E4EBE6; /* surface-dim to contrast the mobile frame */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Custom spring animation for the action sheet */
        @keyframes slideUpSpring {
            0% { transform: translateY(100%); }
            60% { transform: translateY(-2%); }
            80% { transform: translateY(1%); }
            100% { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUpSpring 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        /* Hide scrollbar for the mock chat */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {
    font-size: 24px !important;
  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;
    bottom: 98px !important;
    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;
    background: var(--rastro-primary) !important;
    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {
    position: fixed !important;
    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: 0 !important;
  }
  [class*="rounded-\[2rem\]"],
  .rounded-lg,
  .rounded-xl {
    border-color: rgba(220,228,222,.95) !important;
  }
  main, section { scrollbar-width: none; }
  main::-webkit-scrollbar, section::-webkit-scrollbar, div::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-surface-dim">
<!-- Mock Mobile Screen Container -->
<div class="relative w-full max-w-[400px] h-[850px] max-h-screen bg-surface-container overflow-hidden sm:rounded-[3rem] sm:border-[12px] border-on-surface-variant sm:shadow-2xl flex flex-col font-body">

<div class="flex items-center gap-4 border-b border-outline-variant/50 pb-4 sticky top-0 bg-surface-container/80 backdrop-blur-md z-10 pt-2">
<div class="w-12 h-12 rounded-full overflow-hidden border-2 border-surface-bright">
<img class="w-full h-full object-cover" data-alt="A portrait of a happy Golden Retriever dog outdoors in a sunny park. Warm, vibrant lighting, soft focus background. Candy design system aesthetic with bright colors." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJ9W4_-hFr77hGczBrqKEKNTvVZXBVD3METqJkjd2OIhCIijzqATgseMvOZxmnsZgvmJpLen6B2sck3lcPn357_m8IELP2Lv5T1JPCGjjOB5DX-pREpFyY7u0etZn5QoqXrnpdFD-W6wW5IMmBgc5f5q0ENk9fb61YIPGn-y1Sajda9y2n8WCngBqgK-uNdWbitcu129PtozsfSdbF-nbuX7krKIw-9xcDFBQVbqJ4MtFmj7r5BEHsqGC1x_D9XAQoVx-G5V0s91U"/>
</div>
<div>
<h2 class="font-bold text-on-surface text-lg leading-tight">Milo</h2>
<div class="flex items-center gap-1.5 mt-0.5">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
<span class="text-xs font-medium text-tertiary">En línea</span>
</div>
</div>
</div>
<!-- Chat bubbles mock -->
<div class="w-[85%] p-4 rounded-[1.5rem] rounded-tl-sm bg-surface-bright text-on-surface self-start shadow-sm border border-outline-variant/20">
<p class="text-sm">¡Hola! Ya estamos en el parque. Milo está jugando con otros perritos. 🐶</p>
</div>
<div class="w-[85%] p-4 rounded-[1.5rem] rounded-tr-sm bg-primary text-on-primary self-end shadow-[0_4px_16px_rgba(20,108,90,0.25)]">
<p class="text-sm">¡Qué bueno! Gracias por avisar. ¿Le diste su premio después del paseo?</p>
</div>
<div class="w-[85%] p-4 rounded-[1.5rem] rounded-tl-sm bg-surface-bright text-on-surface self-start shadow-sm border border-outline-variant/20">
<p class="text-sm">Aún no, en unos 10 minutos empezamos el regreso a casa.</p>
</div>
</div>
<!-- DIMMED OVERLAY -->
<div class="absolute inset-0 bg-on-secondary-fixed/30 backdrop-blur-[2px] z-40 animate-fade-in"></div>
<!-- BOTTOM SHEET (ACTION SHEET) -->
<!-- Fixed to bottom, rounded top corners, shadow, animation -->
<div class="absolute bottom-0 left-0 w-full bg-surface-bright rounded-t-[2.5rem] z-50 p-6 flex flex-col shadow-[0_-8px_40px_rgba(29,122,82,0.15)] animate-slide-up">
<!-- Drag Handle indicator -->
<div class="w-12 h-1.5 bg-outline-variant/60 rounded-full mx-auto mb-6"></div>

<!-- Actions List -->
<div class="flex flex-col gap-3">
<!-- STANDARD OPTION 1: Ver Reporte -->
<button class="w-full flex items-center gap-4 px-5 py-3.5 rounded-full bg-surface-container-low hover:bg-primary-container/20 border border-outline-variant/20 text-on-surface font-medium transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">assessment</span>
</div>
<span class="text-[15px]">Ver Reporte</span>
</button>
<!-- STANDARD OPTION 2: Contactar por WhatsApp -->
<button class="w-full flex items-center gap-4 px-5 py-3.5 rounded-full bg-surface-container-low hover:bg-tertiary-container/20 border border-outline-variant/20 text-on-surface font-medium transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-tertiary group-hover:bg-tertiary group-hover:text-on-tertiary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
</div>
<span class="text-[15px]">Contactar por WhatsApp</span>
</button>
<!-- Divider -->
<div class="h-px w-full bg-outline-variant/30 my-2"></div>
<!-- DESTRUCTIVE OPTION 1: Reportar conversación -->
<button class="w-full flex items-center gap-4 px-5 py-3.5 rounded-full bg-error-container/40 hover:bg-error-container border border-error/10 text-error font-bold transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group shadow-[0_4px_12px_rgba(229,62,62,0.05)] hover:shadow-[0_4px_16px_rgba(229,62,62,0.15)]">
<div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error group-hover:bg-error group-hover:text-on-error transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">flag</span>
</div>
<span class="text-[15px]">Reportar conversación</span>
</button>
<!-- DESTRUCTIVE OPTION 2: Bloquear usuario -->
<button class="w-full flex items-center gap-4 px-5 py-3.5 rounded-full bg-error-container/40 hover:bg-error-container border border-error/10 text-error font-bold transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] group shadow-[0_4px_12px_rgba(229,62,62,0.05)] hover:shadow-[0_4px_16px_rgba(229,62,62,0.15)]">
<div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center text-error group-hover:bg-error group-hover:text-on-error transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">block</span>
</div>
<span class="text-[15px]">Bloquear usuario</span>
</button>
</div>
<!-- CANCEL ACTION -->
<!-- Positioned at the bottom, styled neutrally to not compete with actions -->
<button class="mt-4 w-full py-4 rounded-full bg-surface-container-highest text-on-surface-variant font-bold text-[15px] text-center transition-all duration-200 hover:bg-surface-dim hover:text-on-surface active:scale-[0.98]">
                Cancelar
            </button>
<!-- Bottom safe area padding for modern phones -->
<div class="h-4 w-full"></div>
</div>
</div>
