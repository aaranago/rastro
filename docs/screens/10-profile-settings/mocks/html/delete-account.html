<style>
        body { font-family: 'DM Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .icon-fill { font-variation-settings: 'FILL' 1; }
        
        /* Bouncy interactions */
        .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-bounce:hover { transform: scale(1.03); }
        .btn-bounce:active { transform: scale(0.95); }
        
        /* Custom checkbox */
        input[type="checkbox"]:checked {
            background-color: #D6453D; /* Error color for destruction */
            border-color: #D6453D;
        }
        input[type="checkbox"]:focus {
            --tw-ring-color: #D6453D;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {
    font-size: 24px !important;
  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;

    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;

    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {
    position: fixed !important;
    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;

  [class*="rounded-\[2rem\]"],
  .rounded-lg,

  }
  main, section { scrollbar-width: none; }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-4 h-16 w-full z-50 bg-background font-headline text-headline-sm font-bold full-width top-0 text-on-surface-variant">
<button class="p-2 hover:bg-surface-variant rounded-full transition-colors flex items-center justify-center btn-bounce">
<span class="material-symbols-outlined text-on-surface-variant text-2xl">arrow_back</span>
</button>
<span class="text-2xl font-black text-primary tracking-tight">Eliminar cuenta</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-4 py-8 md:py-12 w-full max-w-lg mx-auto">
<div class="bg-surface-container-lowest p-6 md:p-8 rounded-xl shadow-[0_4px_24px_rgba(229,62,62,0.1)] w-full relative overflow-hidden border border-error-container">
<!-- Warning Icon Header -->
<div class="flex flex-col items-center mb-8 text-center relative z-10">
<div class="w-20 h-20 bg-error-container rounded-full flex items-center justify-center mb-4 shadow-[0_8px_16px_rgba(229,62,62,0.15)]">
<span class="material-symbols-outlined text-error text-4xl icon-fill">warning</span>
</div>
<h1 class="font-headline text-2xl font-bold text-on-background mb-2">¿Estás seguro?</h1>
<p class="text-on-surface-variant text-base leading-relaxed">
                    Esta acción es permanente. Al eliminar tu cuenta, perderás acceso a <strong>todos los perfiles de tus mascotas</strong> y se eliminarán tus <strong>reportes activos</strong>. Esta información no podrá ser recuperada.
                </p>
</div>
<!-- Feedback Section -->
<div class="mb-8 relative z-10">
<label class="block font-label text-sm font-bold text-on-background mb-2" for="feedback">¿Por qué nos dejas? (Opcional)</label>
<textarea class="w-full rounded-DEFAULT border-outline-variant bg-surface-container-low text-on-background focus:border-primary focus:ring-2 focus:ring-primary focus:ring-opacity-50 p-4 transition-colors placeholder:text-outline" id="feedback" placeholder="Tus comentarios nos ayudan a mejorar..." rows="3"></textarea>
</div>
<!-- Confirmation Checkbox -->
<div class="mb-8 bg-error-container p-4 rounded-DEFAULT border border-error/20 flex items-start gap-3 relative z-10">
<div class="flex items-center h-6">
<input class="w-5 h-5 rounded border-error/50 text-error focus:ring-error focus:ring-offset-error-container cursor-pointer transition-colors mt-0.5" id="confirm_deletion" type="checkbox"/>
</div>
<label class="font-label text-sm text-on-error-container font-medium cursor-pointer" for="confirm_deletion">
                    Entiendo que esta acción no se puede deshacer y quiero proceder con la eliminación.
                </label>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3 relative z-10">
<button class="w-full bg-error text-on-error font-label font-bold py-4 px-6 rounded-full shadow-[0_4px_16px_rgba(229,62,62,0.25)] flex items-center justify-center gap-2 btn-bounce disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none transition-all" disabled="" id="deleteBtn" type="button">
<span class="material-symbols-outlined">delete_forever</span>
                    Eliminar permanentemente
                </button>
<button class="w-full bg-surface-variant text-on-surface-variant font-label font-bold py-4 px-6 rounded-full hover:bg-surface-container-highest flex items-center justify-center gap-2 btn-bounce transition-colors" type="button">
                    Cancelar
                </button>
</div>
<!-- Subtle background pattern for danger -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #D6453D 10px, #D6453D 20px);"></div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkbox = document.getElementById('confirm_deletion');
            const deleteBtn = document.getElementById('deleteBtn');

            checkbox.addEventListener('change', (e) => {
                deleteBtn.disabled = !e.target.checked;
                if(e.target.checked) {
                    deleteBtn.classList.remove('opacity-50');
                } else {
                    deleteBtn.classList.add('opacity-50');
                }
            });
        });
    </script>
</body></html>
