<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Reportar Avistamiento</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#BFE1D8",
                        "tertiary-container": "#CFE3EE",
                        "surface-bright": "#F7F9F6",
                        "on-error-container": "#8A241D",
                        "error": "#D6453D",
                        "primary": "#146C5A",
                        "surface-container-low": "#FFFFFF",
                        "on-secondary-fixed": "#1a1030",
                        "tertiary-fixed": "#E1EFF5",
                        "outline": "#82908A",
                        "primary-fixed": "#DDEFE9",
                        "on-surface-variant": "#66736D",
                        "on-background": "#17201C",
                        "surface-variant": "#E7EEE9",
                        "secondary-fixed-dim": "#BFE1D8",
                        "error-container": "#FDECEC",
                        "on-secondary-container": "#17201C",
                        "outline-variant": "#DCE4DE",
                        "tertiary-fixed-dim": "#B6D4E4",
                        "on-tertiary-fixed": "#102A3A",
                        "secondary": "#1D7A52",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#146C5A",
                        "on-primary": "#ffffff",
                        "surface-dim": "#E4EBE6",
                        "on-tertiary-container": "#183F56",
                        "tertiary": "#2E6D9E",
                        "inverse-on-surface": "#F7F9F6",
                        "on-surface": "#17201C",
                        "secondary-fixed": "#DDEFE9",
                        "on-secondary": "#ffffff",
                        "background": "#F7F9F6",
                        "secondary-container": "#DDEFE9",
                        "surface": "#F7F9F6",
                        "surface-container-highest": "#DCE4DE",
                        "on-secondary-fixed-variant": "#39564E",
                        "on-primary-fixed-variant": "#0E5145",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#A9D4C9",
                        "surface-container": "#EEF3EE",
                        "inverse-primary": "#A9D4C9",
                        "inverse-surface": "#17201C",
                        "on-tertiary-fixed-variant": "#2E6D9E",
                        "on-primary-fixed": "#0B342D",
                        "surface-container-high": "#E7EEE9",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#17201C"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["DM Sans", "sans-serif"],
                        "display": ["DM Sans", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "label": ["DM Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; }
        .bouncy-hover { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bouncy-hover:hover { transform: scale(1.03); }
        .bouncy-active:active { transform: scale(0.95); transition: transform 0.1s; }
        .glass-card { background: rgba(254, 247, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
        
        /* Hide scrollbar for clean mobile look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {
    font-size: 24px !important;
  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;
    bottom: 98px !important;
    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;
    background: var(--rastro-primary) !important;
    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {
    position: fixed !important;
    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: 0 !important;
  }
  [class*="rounded-\[2rem\]"],
  .rounded-lg,
  .rounded-xl {
    border-color: rgba(220,228,222,.95) !important;
  }
  main, section { scrollbar-width: none; }
  main::-webkit-scrollbar, section::-webkit-scrollbar, div::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0 overflow-x-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar Semantic Shell: Suppressed because this is a transactional "Report" screen with a back button. 
         Replacing with contextual back-nav header -->
<header class="sticky top-0 z-40 bg-background/90 backdrop-blur-md px-6 py-4 flex justify-between items-center w-full">
<button aria-label="Volver" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-primary hover:bg-surface-variant transition-colors bouncy-active">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-display text-xl font-bold tracking-tight text-on-surface">Reportar Avistamiento</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="px-6 py-4 flex flex-col gap-6 max-w-lg mx-auto w-full">
<!-- Header Section -->
<div class="text-center mb-2">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-tertiary-fixed text-tertiary mb-4 shadow-[0_4px_16px_rgba(46,109,158,0.15)]">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<h2 class="font-headline text-2xl font-bold text-on-background mb-2">¿Viste un peludo?</h2>
<p class="font-body text-on-surface-variant">Ayúdanos con los detalles para reunirlo con su familia.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Hora Picker Card -->
<div class="glass-card rounded-[1.5rem] p-5 shadow-[0_8px_24px_rgba(29,122,82,0.08)] bouncy-hover">
<label class="flex items-center gap-2 mb-3 text-secondary font-bold font-label" for="time">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">schedule</span>
                    Hora del avistamiento
                </label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 rounded-full px-5 py-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner font-body font-medium" id="time" type="time" value="14:30"/>
</div>
</div>
<!-- Location/Direction Card -->
<div class="glass-card rounded-[1.5rem] p-5 shadow-[0_8px_24px_rgba(29,122,82,0.08)] bouncy-hover">
<label class="flex items-center gap-2 mb-3 text-secondary font-bold font-label" for="direction">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">directions</span>
                    Dirección / Hacia dónde iba
                </label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 rounded-full px-5 py-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner font-body placeholder:text-outline" id="direction" placeholder="Ej: Corría hacia el parque central..." type="text"/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full bg-tertiary-fixed text-tertiary flex items-center justify-center hover:bg-tertiary-container transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>
</div>
</div>
<!-- Physical Description Card -->
<div class="glass-card rounded-[1.5rem] p-5 shadow-[0_8px_24px_rgba(29,122,82,0.08)] bouncy-hover flex-grow">
<label class="flex items-center gap-2 mb-3 text-secondary font-bold font-label" for="description">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pets</span>
                    Descripción física
                </label>
<textarea class="w-full bg-surface-container-lowest border-0 rounded-[1rem] px-5 py-4 text-on-surface focus:ring-2 focus:ring-primary shadow-inner font-body placeholder:text-outline resize-none" id="description" placeholder="Color de collar, raza, tamaño, marcas distintivas..." rows="4"></textarea>
<div class="flex flex-wrap gap-2 mt-3">
<span class="bg-primary-fixed text-on-primary-fixed px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider cursor-pointer hover:bg-primary-container transition-colors">Perro</span>
<span class="bg-secondary-fixed text-on-secondary-fixed px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider cursor-pointer hover:bg-secondary-container transition-colors">Gato</span>
<span class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider cursor-pointer hover:bg-outline-variant transition-colors">Sin Collar</span>
</div>
</div>
<!-- Optional Photo Upload area -->
<div class="border-2 border-dashed border-outline-variant rounded-[1.5rem] p-6 text-center bg-surface-container-lowest hover:bg-surface-container-low transition-colors cursor-pointer bouncy-hover group">
<div class="w-12 h-12 rounded-full bg-primary-fixed text-primary mx-auto flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<h3 class="font-bold text-on-surface mb-1">Subir foto (opcional)</h3>
<p class="text-xs text-outline font-medium">Aunque esté borrosa, ¡ayuda mucho!</p>
<input accept="image/*" class="hidden" type="file"/>
</div>
<!-- Submit Button Fixed Bottom Area (simulated for mobile) -->
<div class="mt-4 pb-8">
<button class="w-full bg-primary text-on-primary rounded-full py-4 font-bold text-lg shadow-[0_8px_24px_rgba(20,108,90,0.3)] bouncy-hover bouncy-active flex items-center justify-center gap-2" type="submit">
                    Enviar Reporte
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</form>
</main>
<!-- BottomNavBar Semantic Shell: Suppressed. This is a transactional flow (reporting), so global nav is hidden to maintain focus on the task. -->
<script>
        // Simple microinteraction script for the tags
        document.querySelectorAll('.cursor-pointer').forEach(tag => {
            tag.addEventListener('click', function() {
                // Ignore the file upload container
                if(this.tagName.toLowerCase() === 'div' && this.classList.contains('border-dashed')) return;
                
                this.classList.toggle('ring-2');
                this.classList.toggle('ring-primary');
                this.classList.toggle('scale-105');
            });
        });
    </script>
</body></html>
