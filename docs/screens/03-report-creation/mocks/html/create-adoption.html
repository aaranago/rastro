<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>

<style>
        body { font-family: 'DM Sans', sans-serif; }
        .candy-shadow { box-shadow: 0 4px 16px rgba(20,108,90,0.15); }
        .candy-shadow-hover:hover { box-shadow: 0 6px 20px rgba(20,108,90,0.25); transform: scale(1.03); transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .active-scale { transition: transform 0.15s ease-out; }
        .active-scale:active { transform: scale(0.95); }
        
        /* Custom scrollbar for horizontal photo list */
        .photo-scroll::-webkit-scrollbar { height: 6px; }
        .photo-scroll::-webkit-scrollbar-track { background: transparent; }
        .photo-scroll::-webkit-scrollbar-thumb { background: rgba(144, 120, 152, 0.3); border-radius: 9999px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {
    font-size: 24px !important;
  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;
    bottom: 98px !important;
    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;
    background: var(--rastro-primary) !important;
    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {
    position: fixed !important;
    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: 0 !important;
  }
  [class*="rounded-\[2rem\]"],
  .rounded-lg,
  .rounded-xl {
    border-color: rgba(220,228,222,.95) !important;
  }
  main, section { scrollbar-width: none; }
  main::-webkit-scrollbar, section::-webkit-scrollbar, div::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen pb-24 selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-background shadow-[0_4px_16px_rgba(20,108,90,0.15)] sticky top-0 z-40 w-full flex justify-between items-center px-6 py-4">
<button class="text-primary hover:scale-105 transition-transform duration-200 active:scale-95 ease-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-display font-bold text-on-surface text-2xl tracking-tight">Crear Perfil</h1>
<div class="w-6 h-6"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content -->
<main class="px-6 py-8 max-w-lg mx-auto">
<form class="space-y-8">
<!-- Photo Upload Area -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="font-headline font-bold text-xl text-primary">Fotos de tu mascota</h2>
<span class="text-sm font-label text-on-surface-variant font-medium">0/5 subidas</span>
</div>
<div class="flex gap-4 overflow-x-auto pb-4 photo-scroll -mx-6 px-6 snap-x">
<!-- Main Upload Button -->
<label class="shrink-0 w-32 h-32 bg-surface-container rounded-lg border-2 border-dashed border-primary/30 flex flex-col items-center justify-center text-primary cursor-pointer hover:border-primary hover:bg-primary-fixed/30 transition-colors candy-shadow-hover snap-start active-scale">
<span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
<span class="text-xs font-bold">Añadir foto</span>
<input accept="image/*" class="hidden" multiple="" type="file"/>
</label>
<!-- Placeholder slots to indicate limit -->
<div class="shrink-0 w-32 h-32 bg-surface-variant rounded-lg flex items-center justify-center text-outline-variant snap-start opacity-50">
<span class="material-symbols-outlined">image</span>
</div>
<div class="shrink-0 w-32 h-32 bg-surface-variant rounded-lg flex items-center justify-center text-outline-variant snap-start opacity-50">
<span class="material-symbols-outlined">image</span>
</div>
</div>
<p class="text-xs text-on-surface-variant text-center">Sube hasta 5 fotos para ayudar a identificar a tu mascota más fácilmente.</p>
</section>
<!-- Basic Info Section -->
<section class="bg-surface-container-lowest p-6 rounded-lg candy-shadow space-y-6">
<h3 class="font-headline font-bold text-lg text-secondary flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">pets</span>
                    Datos Básicos
                </h3>
<!-- Name Input -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_name">Nombre</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full py-4 px-6 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-inner" id="pet_name" placeholder="Ej. Firulais" type="text"/>
<span class="material-symbols-outlined absolute right-5 top-4 text-outline">badge</span>
</div>
</div>
<!-- Type Dropdown -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_type">Tipo de Mascota</label>
<div class="relative">
<select class="w-full bg-surface-container-high border-none rounded-full py-4 px-6 appearance-none text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all shadow-inner cursor-pointer font-body" id="pet_type">
<option class="text-outline" disabled="" selected="" value="">Selecciona el tipo</option>
<option value="perro">Perro</option>
<option value="gato">Gato</option>
<option value="ave">Ave</option>
<option value="roedor">Roedor</option>
<option value="otro">Otro</option>
</select>
<span class="material-symbols-outlined absolute right-5 top-4 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Breed Input -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_breed">Raza (Opcional)</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full py-4 px-6 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-inner" id="pet_breed" placeholder="Ej. Labrador" type="text"/>
<span class="material-symbols-outlined absolute right-5 top-4 text-outline">category</span>
</div>
</div>
</section>
<!-- Details Section -->
<section class="bg-surface-container-lowest p-6 rounded-lg candy-shadow space-y-6">
<h3 class="font-headline font-bold text-lg text-tertiary flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">info</span>
                    Detalles y Marcas
                </h3>
<!-- Description Textarea -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_description">Descripción o Marcas Distintivas</label>
<textarea class="w-full bg-surface-container-high border-none rounded-lg py-4 px-6 text-on-surface focus:ring-2 focus:ring-tertiary focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-inner resize-none" id="pet_description" placeholder="Describe cualquier marca especial, color de collar, o detalles que ayuden a identificarla..." rows="4"></textarea>
</div>
</section>
<!-- Main CTA -->
<div class="pt-4 pb-8">
<button class="w-full bg-primary text-on-primary font-bold text-lg py-5 px-8 rounded-full candy-shadow-hover active-scale flex items-center justify-center gap-2 group" type="button">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">save</span>
                    Guardar Mascota
                </button>
</div>
</form>
</main>
<!-- Contextual FAB Suppression: Hide global nav items as this is a transactional creation screen -->
</body></html>
