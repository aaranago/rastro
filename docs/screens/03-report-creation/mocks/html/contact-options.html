<style>
        body { font-family: 'DM Sans', sans-serif; }
        .bouncy-hover { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease; }
        .bouncy-hover:hover { transform: scale(1.03); }
        .bouncy-active:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* Custom radio styling */
        .candy-radio {
            appearance: none;
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid #82908A;
            border-radius: 50%;
            outline: none;
            transition: all 0.2s ease-in-out;
            position: relative;
        }
        .candy-radio:checked {
            border-color: #146C5A;
            background-color: #F7F9F6;
        }
        .candy-radio:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0.75rem;
            height: 0.75rem;
            background-color: #146C5A;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {
    font-size: 24px !important;
  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;
    bottom: 98px !important;
    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;
    background: var(--rastro-primary) !important;
    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {
    position: fixed !important;
    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: 0 !important;
  }
  [class*="rounded-\[2rem\]"],
  .rounded-lg,
  .rounded-xl {
    border-color: rgba(220,228,222,.95) !important;
  }
  main, section { scrollbar-width: none; }
  main::-webkit-scrollbar, section::-webkit-scrollbar, div::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-surface text-on-surface h-screen flex flex-col overflow-hidden max-w-md mx-auto relative shadow-2xl">
<!-- Top Navigation (Transactional) -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-surface z-10">
<button class="material-symbols-outlined text-primary text-2xl bouncy-hover bouncy-active">arrow_back</button>
<div class="flex space-x-1 items-center">
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim"></div>
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim"></div>
<div class="w-2 h-2 rounded-full bg-primary w-4 transition-all duration-300"></div>
</div>
<button class="material-symbols-outlined text-on-surface-variant text-2xl bouncy-hover bouncy-active">close</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-6 pt-4 pb-24 scrollbar-hide">
<div class="mb-8">
<h1 class="font-display text-3xl font-bold tracking-tight text-primary mb-2">Opciones de Contacto</h1>
<p class="text-on-surface-variant text-sm">¿Cómo prefieres que te contacten si encuentran a tu mascota?</p>
</div>
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_16px_rgba(20,108,90,0.1)] mb-8 flex items-start space-x-3 border border-surface-container-highest">
<span class="material-symbols-outlined text-tertiary mt-0.5">security</span>
<p class="text-xs text-on-surface-variant leading-relaxed">
                Tu información de contacto se mantendrá privada y <strong class="text-primary font-bold">solo será visible</strong> para la persona que reporte un hallazgo de tu mascota.
            </p>
</div>
<div class="space-y-4">
<!-- Option 1: Chat en Rastro -->
<label class="block relative group cursor-pointer">
<input checked="" class="peer sr-only" name="contact_method" onchange="toggleWhatsAppInput()" type="radio" value="chat"/>
<div class="bg-surface-container-lowest rounded-xl p-5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed shadow-[0_4px_16px_rgba(29,122,82,0.05)] peer-checked:shadow-[0_4px_16px_rgba(20,108,90,0.15)] transition-all duration-300 bouncy-hover flex items-center justify-between">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">forum</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-lg">Chat en Rastro</h3>
<p class="text-xs text-on-surface-variant">Mensajes seguros en la app</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="w-3 h-3 rounded-full bg-surface hidden peer-checked:block"></div>
</div>
<!-- Custom radio visual overlay -->
<div class="absolute right-5 w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center transition-colors duration-200 group-hover:border-primary peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 transition-opacity duration-200 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- Option 2: WhatsApp -->
<label class="block relative group cursor-pointer">
<input class="peer sr-only" name="contact_method" onchange="toggleWhatsAppInput()" type="radio" value="whatsapp"/>
<div class="bg-surface-container-lowest rounded-xl p-5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed shadow-[0_4px_16px_rgba(29,122,82,0.05)] peer-checked:shadow-[0_4px_16px_rgba(20,108,90,0.15)] transition-all duration-300 bouncy-hover flex items-center justify-between">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-full bg-surface-variant text-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-lg">WhatsApp</h3>
<p class="text-xs text-on-surface-variant">Contacto directo y rápido</p>
</div>
</div>
<!-- Custom radio visual overlay -->
<div class="absolute right-5 w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center transition-colors duration-200 group-hover:border-primary peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 transition-opacity duration-200 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- Conditional WhatsApp Input -->
<div class="hidden overflow-hidden transition-all duration-300 transform origin-top pt-2" id="whatsapp-input-container">
<div class="bg-surface-container-lowest p-5 rounded-xl shadow-sm border border-surface-container-high">
<label class="block text-sm font-medium text-on-surface mb-2">Número de teléfono</label>
<div class="flex relative">
<span class="inline-flex items-center px-4 rounded-l-full border border-r-0 border-outline-variant bg-surface-variant text-on-surface-variant text-sm font-medium">
                            +52
                        </span>
<input class="flex-1 min-w-0 block w-full px-4 py-3 rounded-none rounded-r-full border-outline-variant focus:ring-primary focus:border-primary text-on-surface bg-surface-bright placeholder-outline transition-all duration-200" placeholder="123 456 7890" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-3.5 text-primary opacity-0 transition-opacity duration-200 input-check">check_circle</span>
</div>
<p class="mt-2 text-xs text-on-surface-variant flex items-center">
<span class="material-symbols-outlined text-xs mr-1">info</span>
                        Asegúrate de incluir tu lada.
                    </p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent pb-8">
<button class="w-full bg-primary text-on-primary font-bold text-lg py-4 rounded-full shadow-[0_8px_24px_rgba(20,108,90,0.3)] bouncy-hover bouncy-active flex items-center justify-center space-x-2">
<span>Publicar Alerta</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
<script>
        function toggleWhatsAppInput() {
            const isWhatsApp = document.querySelector('input[name="contact_method"]:checked').value === 'whatsapp';
            const container = document.getElementById('whatsapp-input-container');
            
            if (isWhatsApp) {
                container.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating opacity/transform if needed
                setHoraout(() => {
                    container.classList.add('opacity-100', 'translate-y-0');
                    container.classList.remove('opacity-0', '-translate-y-4');
                }, 10);
            } else {
                container.classList.add('hidden');
            }
        }
    </script>
</body></html>
