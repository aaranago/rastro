<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">

</div>

</div>
</div>

<h3 class="font-bold text-on-secondary-container text-lg">Fotos Recientes</h3>
</div>
<div class="grid grid-cols-3 gap-3">

<button class="absolute top-1 right-1 w-6 h-6 bg-surface/80 rounded-full flex items-center justify-center text-error hover:bg-surface active:scale-95 transition-all">

</button>
</div>
<!-- Empty Slots -->

<span class="material-symbols-outlined text-2xl mb-1 text-primary-fixed-dim">add</span>
</button>
<button class="aspect-square rounded-xl bg-surface-variant border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:border-primary/50 transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl mb-1 text-primary-fixed-dim">add</span>
</button>
<button class="aspect-square rounded-xl bg-surface-variant border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:border-primary/50 transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl mb-1 text-primary-fixed-dim">add</span>
</button>
<button class="aspect-square rounded-xl bg-surface-variant border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high hover:border-primary/50 transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl mb-1 text-primary-fixed-dim">add</span>
</button>
</div>
<p class="text-xs text-on-surface-variant mt-3 italic">Sube hasta 5 fotos claras. Fotos de cara y cuerpo entero son mejores.</p>

<section class="space-y-5">
<!-- Pet Name -->
<div>
<label class="block text-sm font-medium text-on-surface mb-1 ml-1" for="pet-name">Nombre de la mascota</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary-fixed-dim">pets</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-full text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm" id="pet-name" placeholder="Ej. Luna" type="text" value="Max"/>
</div>
</div>
<!-- Description -->
<div>
<label class="block text-sm font-medium text-on-surface mb-1 ml-1" for="description">¿Cómo fue visto por última vez?</label>
<textarea class="block w-full p-4 bg-surface-container-low border border-outline-variant rounded-xl text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm resize-none" id="description" placeholder="Describe dónde y cuándo lo viste, qué llevaba puesto (collar, correa), o hacia dónde se dirigía..." rows="3"></textarea>
</div>
<!-- Distinctive Markings -->
<div>
<label class="block text-sm font-medium text-on-surface mb-1 ml-1" for="markings">Marcas distintivas o características</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 pt-3 pointer-events-none">
<span class="material-symbols-outlined text-secondary">star</span>
</div>
<textarea class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-on-surface focus:ring-2 focus:ring-secondary focus:border-secondary transition-all shadow-sm resize-none" id="markings" placeholder="Ej. Mancha blanca en la pata izquierda, cicatriz en la oreja..." rows="2"></textarea>
</div>
</div>
</section>
<!-- Next Button Container -->
<div class="mt-10 mb-4">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-lg shadow-[0_4px_16px_rgba(20,108,90,0.3)] bouncy-hover bouncy-active flex items-center justify-center gap-2">

</button>
</div>
