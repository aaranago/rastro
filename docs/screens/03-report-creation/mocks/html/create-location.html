<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pb-24 md:pb-0">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>

<label class="flex items-start p-5 bg-surface-bright rounded-xl border-2 border-surface-dim cursor-pointer tinted-shadow-secondary bouncy-hover transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-fixed has-[:checked]:shadow-[0_4px_16px_rgba(20,108,90,0.2)]">

<div class="flex-shrink-0 mt-1 mr-4 text-secondary peer-checked:text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">blur_on</span>
</div>
<div>
<span class="block font-bold text-lg mb-1 peer-checked:text-on-background">Ubicación aproximada (pública)</span>

<p class="text-on-surface-variant text-sm font-body">Ayuda a los buscadores a encontrar el lugar preciso. Úsalo si es seguro compartirlo.</p>

<div class="ml-auto flex-shrink-0 text-outline-variant peer-checked:text-primary">
