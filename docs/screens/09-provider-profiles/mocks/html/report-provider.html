<style id="rastro-polish">

<body class="bg-background min-h-screen text-on-background relative overflow-hidden flex flex-col items-center justify-center">
<!-- Mock Background Content (Blurred/Dimmed) -->
<div class="absolute inset-0 w-full h-full p-6 flex flex-col gap-6 filter blur-sm brightness-75 transition-all duration-300 pointer-events-none z-0">
<div class="h-64 w-full rounded-xl bg-surface-container shadow-md flex items-center justify-center">
<div class="w-32 h-32 rounded-full bg-surface-container-highest border-4 border-surface-container-lowest"></div>
</div>
<div class="flex-1 w-full bg-surface-container rounded-xl p-6 flex flex-col gap-4">

</div>

<!-- Overlay Dimmer -->
<div class="absolute inset-0 bg-on-background/40 backdrop-blur-sm z-10" id="dimmer"></div>
<!-- Action Sheet Bottom Sheet -->
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-center spring-up" id="bottomSheet">
<div class="bg-surface-container-lowest w-full max-w-md rounded-t-[2.5rem] shadow-[0_-8px_30px_rgba(20,108,90,0.15)] flex flex-col px-6 pt-4 pb-8 relative">

<!-- Header -->
<div class="flex items-center justify-between mb-8">
<h2 class="font-display font-bold text-2xl text-on-surface">Reportar Perfil</h2>
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors" id="closeBtn">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<p class="font-body text-on-surface-variant mb-6 leading-relaxed">
                Por favor, selecciona el motivo de tu reporte. Esta información es confidencial.
            </p>
<!-- Options List -->
<div class="flex flex-col gap-3 mb-8">
<!-- Option 1 -->
<button class="w-full bg-surface-container hover:bg-surface-container-high active:scale-[0.98] transition-all duration-200 rounded-full px-6 py-4 flex items-center justify-between group">
<div class="flex items-center gap-4">

</div>

</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 2 -->
<button class="w-full bg-surface-container hover:bg-surface-container-high active:scale-[0.98] transition-all duration-200 rounded-full px-6 py-4 flex items-center justify-between group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-secondary-container text-secondary flex items-center justify-center group-hover:bg-secondary group-hover:text-on-secondary transition-colors">
<span class="material-symbols-outlined" data-icon="warning">warning</span>
</div>
<span class="font-label font-medium text-lg text-on-surface">Comportamiento inapropiado</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 3 -->

<span class="material-symbols-outlined" data-icon="sentiment_dissatisfied">sentiment_dissatisfied</span>
</div>
<span class="font-label font-medium text-lg text-on-surface">Servicio deficiente</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 4 -->

<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center group-hover:bg-outline group-hover:text-on-secondary transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</div>
<span class="font-label font-medium text-lg text-on-surface">Otro</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Cancel Action -->
<button class="w-full bg-transparent text-on-surface-variant font-label font-bold py-4 rounded-full hover:bg-surface-variant transition-colors" id="cancelBtn">
                Cancelar
            </button>
</div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const bottomSheet = document.getElementById('bottomSheet');
            const dimmer = document.getElementById('dimmer');
            const closeBtn = document.getElementById('closeBtn');
            const cancelBtn = document.getElementById('cancelBtn');

            function closeSheet() {
                bottomSheet.style.transform = 'translateY(100%)';
                bottomSheet.style.opacity = '0';
                bottomSheet.style.transition = 'transform 0.3s ease-in, opacity 0.3s ease-in';
                dimmer.style.opacity = '0';
                dimmer.style.transition = 'opacity 0.3s ease-in';
                
                setHoraout(() => {
                    // Reset or navigate in a real app
                }, 300);
            }

            closeBtn.addEventListener('click', closeSheet);
            cancelBtn.addEventListener('click', closeSheet);
            dimmer.addEventListener('click', closeSheet);
            
            // Add bounce effect to options on click
            const options = document.querySelectorAll('#bottomSheet button.group');
            options.forEach(opt => {
                opt.addEventListener('click', function() {
                    // Visual feedback
                    this.style.transform = 'scale(0.95)';
                    setHoraout(() => {
                        this.style.transform = 'scale(1)';
                        // closeSheet(); // Uncomment to close immediately after selection
                    }, 150);
                });
            });
        });
    </script>
