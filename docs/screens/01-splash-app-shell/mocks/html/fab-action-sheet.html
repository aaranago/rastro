<style>
        /* Custom bouncy transition for Candy theme */
        .bouncy-hover {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }
        .bouncy-hover:hover {
            transform: scale(1.05);
        }
        .bouncy-hover:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }
        
        /* Action Sheet Entrance Animation */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Staggered delays for child elements */
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-250 { animation-delay: 250ms; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  
<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {

  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;
    bottom: 98px !important;
    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;
    background: var(--rastro-primary) !important;
    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {

    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: 0 !important;
  }
  [class*="rounded-\[2rem\]"],
  .rounded-lg,
  .rounded-xl {
    border-color: rgba(220,228,222,.95) !important;
  }
  main, section { scrollbar-width: none; }
  main::-webkit-scrollbar, section::-webkit-scrollbar, div::-webkit-scrollbar { display: none; }

<body class="bg-background text-on-surface font-body h-screen w-full overflow-hidden relative selection:bg-primary-fixed selection:text-on-primary-fixed">

</div>
<!-- TopAppBar (Shared Component) -->

<header class="flex justify-between items-center px-4 h-16 w-full z-10 bg-background dark:bg-background docked full-width top-0 absolute">
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 0;">pets</span>
</button>
<h1 class="font-headline text-headline-sm font-bold text-2xl font-black text-primary dark:text-primary-fixed-dim tracking-tight">Rastro</h1>
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 0;">search</span>
</button>
</header>
<!-- FAB Action Sheet Overlay -->
<!-- Triggered state: covers the screen with a vibrant blur -->
<div class="fixed inset-0 z-40 bg-surface/80 backdrop-blur-xl flex flex-col justify-end items-center pb-32 px-4 transition-all duration-300">
<!-- Action Buttons Container (Bento/Grid Layout) -->
<div class="w-full max-w-md grid grid-cols-1 gap-4 mb-8">
<!-- Button 1: Reportar pérdida (Primary Pink) -->
<button class="w-full bouncy-hover animate-pop-in delay-100 bg-primary text-on-primary rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(20,108,90,0.3)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-white/20 p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">campaign</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Reportar pérdida</span>
<span class="material-symbols-outlined ml-auto relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Button 2: Reportar encontrada (Tertiary Blue) -->
<button class="w-full bouncy-hover animate-pop-in delay-150 bg-tertiary text-on-tertiary rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(46,109,158,0.3)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-white/20 p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Reportar encontrada</span>
<span class="material-symbols-outlined ml-auto relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Button 3: Reportar avistamiento (Secondary Purple) -->
<button class="w-full bouncy-hover animate-pop-in delay-200 bg-secondary text-on-secondary rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(29,122,82,0.3)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-white/20 p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Reportar avistamiento</span>
<span class="material-symbols-outlined ml-auto relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Button 4: Dar en adopción (Primary Container / Soft Pink) -->
<button class="w-full bouncy-hover animate-pop-in delay-250 bg-primary-container text-on-primary-container rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(240,128,192,0.3)] group relative overflow-hidden border-2 border-primary-fixed-dim">
<div class="absolute inset-0 bg-white/40 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-primary/10 text-primary p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">home_health</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Dar en adopción</span>
<span class="material-symbols-outlined ml-auto text-primary relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
<!-- Global FAB (Activo/Open State -> Close Action) -->
<div class="absolute bottom-24 flex justify-center w-full z-50 animate-pop-in delay-100">
<button class="bg-surface text-on-surface p-5 rounded-full shadow-[0_8px_24px_rgba(0,0,0,0.12)] bouncy-hover flex items-center justify-center border-2 border-surface-variant">
<span class="material-symbols-outlined text-3xl text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
</div>
<!-- BottomNavBar (Shared Component) -->
<!-- Hidden on md screens per rules. Using exact classes from JSON. -->
<!-- Activo State Logic: 'Cerca' (Explore/Map) is the most logical active tab when a generic global reporting FAB is tapped, as it usually originates from the main map view. -->
<button class="rastro-global-fab" aria-label="Crear reporte"><span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add_alert</span></button>
<nav class="fixed bottom-0 left-0 w-full z-30 flex justify-around items-center px-2 pb-4 pt-2 bg-surface dark:bg-surface-container-low shadow-lg shadow-[0_-4px_16px_rgba(20,108,90,0.15)] rounded-t-lg md:hidden">
<!-- Activo Tab: Cerca -->
<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-5 py-1.5 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-label text-xs font-medium">Cerca</span>
</button>

<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 active:scale-90 transition-transform duration-150 rounded-full">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">notifications</span>
<span class="font-label text-xs font-medium">Actividad</span>
</button>
<!-- Placeholder space for FAB in standard view (not clickable here, just structural) -->
<div class="w-16"></div>

<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 active:scale-90 transition-transform duration-150 rounded-full">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">menu_book</span>
<span class="font-label text-xs font-medium">Recursos</span>
</button>
<!-- Inactive Tab: Perfil -->
<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 active:scale-90 transition-transform duration-150 rounded-full">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="font-label text-xs font-medium">Perfil</span>
</button>
</nav>
