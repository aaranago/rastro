<style>
        body { font-family: 'DM Sans', sans-serif; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<style id="rastro-polish">
  :root {
    color-scheme: light;
    --rastro-bg: #F7F9F6;
    --rastro-surface: #FFFFFF;
    --rastro-surface-muted: #EEF3EE;
    --rastro-text: #17201C;
    --rastro-muted: #66736D;
    --rastro-border: #DCE4DE;
    --rastro-primary: #146C5A;
    --rastro-primary-dark: #0E5145;
    --rastro-lost: #D6453D;
    --rastro-found: #1D7A52;
    --rastro-sighting: #2E6D9E;
    --rastro-adoption: #9D4F66;
  }
  html, body {
    width: 100% !important;
    max-width: 100vw !important;
    min-height: 100dvh !important;
    margin: 0 !important;
    overflow-x: hidden !important;
    background: var(--rastro-bg) !important;
    color: var(--rastro-text) !important;
    font-family: "DM Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    letter-spacing: 0 !important;
  }
  * { letter-spacing: 0 !important; }
  .candy-shadow-primary { box-shadow: 0 12px 28px rgba(20,108,90,.22) !important; }
  .candy-shadow-secondary { box-shadow: 0 12px 28px rgba(29,122,82,.16) !important; }
  .candy-shadow-tertiary { box-shadow: 0 12px 30px rgba(46,109,158,.18) !important; }
  .text-primary { color: var(--rastro-primary) !important; }
  .text-secondary { color: var(--rastro-found) !important; }
  .text-tertiary { color: var(--rastro-sighting) !important; }
  .text-on-background, .text-on-surface { color: var(--rastro-text) !important; }
  .text-on-surface-variant { color: var(--rastro-muted) !important; }
  .bg-background, .bg-surface, .bg-surface-bright { background-color: var(--rastro-bg) !important; }
  .bg-surface-container-lowest, .bg-white { background-color: var(--rastro-surface) !important; }
  .bg-surface-container, .bg-surface-container-low, .bg-surface-container-high, .bg-surface-variant { background-color: var(--rastro-surface-muted) !important; }
  .bg-primary { background-color: var(--rastro-primary) !important; }
  .bg-secondary { background-color: var(--rastro-found) !important; }
  .bg-tertiary { background-color: var(--rastro-sighting) !important; }
  .bg-primary-container, .bg-primary-fixed, .bg-primary-fixed-dim { background-color: #DDEFE9 !important; }
  .bg-secondary-container, .bg-secondary-fixed { background-color: #E7F3EB !important; }
  .bg-tertiary-container, .bg-tertiary-fixed { background-color: #E1EFF5 !important; }
  .border-primary, .border-primary-fixed, .border-secondary-fixed, .border-outline-variant, .border-surface-variant { border-color: var(--rastro-border) !important; }
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.15\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.2\)\],
  .shadow-\[0_4px_16px_rgba\(224\,64\,160\,0\.3\)\] {
    box-shadow: 0 12px 28px rgba(20,108,90,.18) !important;
  }
  img[data-location],
  [data-alt*="map"],
  [data-alt*="Map"],
  [data-alt*="mapa"],
  [data-alt*="Mapa"] {
    filter: saturate(.72) hue-rotate(118deg) contrast(.98) brightness(1.02);
  }
  nav.fixed.bottom-0 {
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-width: 430px !important;
    height: 86px !important;
    margin-inline: auto !important;
    padding: 8px 10px 14px !important;
    border-radius: 24px 24px 0 0 !important;
    border-top: 1px solid var(--rastro-border) !important;
    background: rgba(255,255,255,.96) !important;
    box-shadow: 0 -12px 32px rgba(23,32,28,.10) !important;
  }
  nav.fixed.bottom-0 a {
    min-width: 0 !important;
    flex: 1 1 0 !important;
    padding-left: 6px !important;
    padding-right: 6px !important;
  }
  nav.fixed.bottom-0 :is(a, button) {
    min-width: 0 !important;
    width: auto !important;
    flex: 1 1 0 !important;
    height: 64px !important;
    margin: 0 !important;
    padding: 6px !important;
    border: 0 !important;
    border-radius: 18px !important;
    background: transparent !important;
    color: var(--rastro-muted) !important;
    box-shadow: none !important;
    transform: none !important;
  }
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary"],
  nav.fixed.bottom-0 :is(a, button)[class~="bg-primary-container"] {
    background: #DDEFE9 !important;
    color: var(--rastro-primary) !important;
  }
  nav.fixed.bottom-0 :is(a, button) .material-symbols-outlined {
    font-size: 24px !important;
  }
  nav.fixed.bottom-0 span:last-child {
    max-width: 78px !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
  }
  .fixed.bottom-24,
  .rastro-global-fab {
    right: 18px !important;
    bottom: 98px !important;
    width: 60px !important;
    height: 60px !important;
    border-radius: 999px !important;
    background: var(--rastro-primary) !important;
    color: white !important;
    box-shadow: 0 18px 30px rgba(20,108,90,.28) !important;
  }
  .rastro-global-fab {
    position: fixed !important;
    z-index: 40 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: 0 !important;
  }
  [class*="rounded-\[2rem\]"],
  .rounded-lg,
  .rounded-xl {
    border-color: rgba(220,228,222,.95) !important;
  }
  main, section { scrollbar-width: none; }
  main::-webkit-scrollbar, section::-webkit-scrollbar, div::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 z-50 bg-surface dark:bg-surface-dim shadow-[0_4px_16px_rgba(20,108,90,0.15)] flex justify-between items-center px-6 py-4 fixed md:sticky">
<button class="hover:scale-105 transition-transform duration-200 active:scale-95 text-primary dark:text-primary-fixed-dim flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">pets</span>
</button>
<h1 class="text-2xl font-black text-primary dark:text-primary-fixed-dim tracking-tight font-headline">Rastro</h1>
<button class="hover:scale-105 transition-transform duration-200 active:scale-95 text-primary dark:text-primary-fixed-dim flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-2xl">notifications</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pt-24 pb-32 md:pt-12 md:pb-12 max-w-md mx-auto w-full">

<div class="w-full aspect-square max-w-[320px] mb-8 relative rounded-full bg-surface-container-low flex items-center justify-center shadow-[0_8px_32px_rgba(29,122,82,0.1)] overflow-hidden">
<img class="w-full h-full object-cover animate-[bounce_3s_ease-in-out_infinite]" data-alt="A playful, vibrant 3D vector illustration of a happy golden retriever dog and a curious tabby cat looking eagerly at a brightly colored glowing smartphone screen and a cute modern mailbox. The style is modern joyful pop-art with soft rounded pill-like edges, saturated hot pinks, deep purples, and sky blues against a warm light pink surface background. The scene is brightly lit with friendly, energetic mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdHbegqQ08WHzQNU8impQa8juEDQoSBnx3gZrceHHIwuqJvjMO-NbBGwsTiUvx0LnOgDjUptf-lRt1hr6C0JmvCup5m5f3k4sw9D_djLcUCCOb9mrrd1dS4NWV8ZiLzT5C_RgnZEfi0z8FygGjxOHUkpuq8SPIBcSzzn1ZMs0wqF-V4nf1kRerQ61OZPuHqHpaNYKEX76aMLfvgejjfePjVGq7GDOO7Ewn_Tb1kyIRxMqKX7_BAKFR8sflYHuNxiYssgaS_H_ckfg" style="animation-duration: 4s;"/>
</div>
<!-- Copy -->
<div class="text-center mb-10 space-y-4">
<h2 class="font-headline font-bold text-3xl tracking-tight text-on-surface">Tu Actividad te Espera</h2>
<p class="font-body text-on-surface-variant text-lg leading-relaxed">
                Inicia sesión para recibir alertas en tiempo real, chatear con otros dueños de mascotas de tu zona y llevar un registro detallado de tus reportes.
            </p>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-4">
<button class="w-full bg-primary text-on-primary rounded-full px-8 py-4 font-label font-bold text-lg shadow-[0_4px_16px_rgba(20,108,90,0.25)] hover:scale-[1.03] active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
<span>Iniciar sesión</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">login</span>
</button>
<button class="w-full bg-surface-container-high text-on-surface rounded-full px-8 py-4 font-label font-bold text-lg hover:bg-primary-container hover:text-on-primary-container hover:scale-[1.03] active:scale-95 transition-all duration-200">
                Crear cuenta
            </button>
</div>
</main>
<!-- BottomNavBar -->
<button class="rastro-global-fab" aria-label="Crear reporte"><span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">add_alert</span></button>
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface dark:bg-surface-dim shadow-[0_-4px_16px_rgba(29,122,82,0.1)] rounded-t-lg">
<!-- Cerca -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-5 py-1 hover:scale-110 transition-transform duration-200 active:scale-90 group" href="#">
<span class="material-symbols-outlined text-2xl group-hover:text-secondary transition-colors">explore</span>
<span class="font-label font-medium text-[10px] mt-1">Cerca</span>
</a>
<!-- Actividad (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-6 py-1.5 transition-all duration-300 ease-out shadow-[0_4px_12px_rgba(240,128,192,0.3)]" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<span class="font-label font-bold text-[10px] mt-1">Actividad</span>
</a>
<!-- Recursos -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-5 py-1 hover:scale-110 transition-transform duration-200 active:scale-90 group" href="#">
<span class="material-symbols-outlined text-2xl group-hover:text-secondary transition-colors">menu_book</span>
<span class="font-label font-medium text-[10px] mt-1">Recursos</span>
</a>
<!-- Perfil -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-5 py-1 hover:scale-110 transition-transform duration-200 active:scale-90 group" href="#">
<span class="material-symbols-outlined text-2xl group-hover:text-secondary transition-colors">account_circle</span>
<span class="font-label font-medium text-[10px] mt-1">Perfil</span>
</a>
