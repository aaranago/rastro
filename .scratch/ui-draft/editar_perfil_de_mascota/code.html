<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Editar Perfil de Mascota - Rastro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">

            darkMode: "class",

                extend: {
                    "colors": {

                        "on-tertiary-fixed": "#001a33",

                        "tertiary-fixed": "#c8eaff",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#00334d",
                        "on-surface": "#2e1a28",
                        "secondary": "#7c52aa",
                        "on-surface-variant": "#604868",
                        "outline": "#907898",
                        "surface-container-highest": "#ece2ec",
                        "secondary-fixed": "#eedcff",
                        "on-secondary-container": "#2e2040",
                        "primary": "#e040a0",
                        "surface-bright": "#fef7ff",
                        "surface-container": "#f8eef8",
                        "tertiary": "#0096cc",
                        "primary-container": "#f080c0",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#f2e8f2",
                        "on-primary-fixed-variant": "#a02070",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#fef7ff",

                    "borderRadius": {
                        "DEFAULT": "1rem",

                    "fontFamily": {
                        "headline": ["DM Sans", "sans-serif"],
                        "display": ["DM Sans", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "label": ["DM Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; }
        /* Microinteraction base classes */
        .bouncy-hover { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bouncy-hover:hover { transform: scale(1.03); }
        .bouncy-hover:active { transform: scale(0.95); transition-duration: 0.1s; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-28 antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (From Shared Components JSON) -->
<header class="bg-background dark:bg-background sticky top-0 z-40 shadow-[0_4px_16px_rgba(224,64,160,0.15)] w-full">
<div class="flex justify-between items-center px-6 py-4 w-full">
<button class="text-primary dark:text-primary-fixed hover:scale-105 transition-transform duration-200 active:scale-95 ease-out flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-2xl" data-icon="pets">pets</span>
</button>
<h1 class="font-display font-bold text-on-surface text-2xl tracking-tight text-primary dark:text-primary-fixed">Rastro</h1>
<button class="hover:scale-105 transition-transform duration-200 active:scale-95 ease-out rounded-full overflow-hidden w-10 h-10 border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A vibrant, high-key portrait of a smiling young person with brightly colored hair, shot against a soft pastel pink background. The lighting is soft and flattering, matching a joyful 'Candy' brand identity with saturated colors and a friendly mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNtrr5KklnBQOopD7N0o1vI8D5gPysAiL7Bg6kFr0rmlqC0CiDqb7ECXdeh9ivbDARfckwQVsC8HG4kS5Ic1TX_ZotO8oR5bpQ8HPL4MIGyT-uSePPodrLSfj18EiZdlHS8XfoFxnS_AJnG7IPy-xvXkBDHvqlsv03epPiaopvCpZ8Y15FPvZRJVVm-NfrsANw4DUUzX3v1IW5Vwqys1HxxQ-gF4gG9-bbuNH0XXCQmPdrJwHv_w0G2aIiN0f0uaRZxm61i8uAk9I"/>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="px-5 pt-6 max-w-md mx-auto">
<div class="flex items-center gap-3 mb-6">
<button class="text-on-surface-variant bouncy-hover flex items-center justify-center w-10 h-10 rounded-full bg-surface-container-highest">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h2 class="font-headline font-bold text-2xl text-on-surface">Editar Perfil</h2>
</div>
<!-- Photos Section -->
<section class="mb-8 bg-surface-container-low rounded-lg p-4 shadow-[0_4px_12px_rgba(124,82,170,0.05)] border border-surface-dim/30">
<h3 class="font-label font-bold text-sm text-secondary mb-3 flex items-center gap-1">
<span class="material-symbols-outlined text-lg" data-icon="photo_library">photo_library</span>
                Fotos de la Mascota
            </h3>
<div class="grid grid-cols-3 gap-3">
<!-- Existing Photo 1 -->
<div class="relative aspect-square rounded-[1rem] overflow-hidden shadow-sm group">
<img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" data-alt="A close-up, vibrant photo of a happy Golden Retriever puppy with an open mouth, looking energetic. The background is a deeply saturated, sunny green park, perfectly capturing the joyful, playful 'Candy' aesthetic with warm, bright lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsaHr3RQbH6Bz8t_MpncgMoVTna2xlpXWM77325FVDgbBRDCOUXx0rKjsu1NwkmYkyWUpqJ5a7E0RSlAHsQ2uibRHbt2T_02WYPSUjFg7iiPvAIuYvM0gM4cg_J1DIp-ZKtHiI5T_xNAZ8WSBeS0r45YKZab825QPW_6lp_AgMVJYn3OdAnQS3xSZhfldYT4irqgekSzwMWL46pkm5NMlQnfWEAXbXMENduEIEsc6Y3vjcIqD3JsaiUhaxMtdc3DcJzJtnZbrLI-Q"/>
<button class="absolute top-1 right-1 w-7 h-7 bg-surface/90 backdrop-blur-sm rounded-full flex items-center justify-center text-error hover:bg-error-container hover:text-error bouncy-hover shadow-sm">
<span class="material-symbols-outlined text-lg" data-icon="close">close</span>
</button>
</div>
<!-- Existing Photo 2 -->
<div class="relative aspect-square rounded-[1rem] overflow-hidden shadow-sm group">
<img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" data-alt="A dynamic action shot of a fluffy white terrier dog running with a bright hot pink toy in its mouth. The lighting is sunny and cheerful, with highly saturated colors that fit a vibrant, playful light-mode UI aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAadIJPAy00Ru-eEathtysLEJesOVDhaFnHmRXvVnwrGvIQFVyTnMJR3G6nerMtAtkjwgoCyjFVlYN2ObeyX3ryC07EUqK9o-lW-3Ie8FBJTu5x-raQJpHVcjkFyC0VI4SMVIF-LgpG-Q-qNFQRHaC8kfk69-Cef72jXV-nvos93DuTYMqOUyObQT9R5llH4KmhrUGCYl2PYQL19y1tVu2KmveoESjVUwegibrIOVgIbKUn9FVAbbq9_HQfDb7HQI91wSyktLyDOg0"/>
<button class="absolute top-1 right-1 w-7 h-7 bg-surface/90 backdrop-blur-sm rounded-full flex items-center justify-center text-error hover:bg-error-container hover:text-error bouncy-hover shadow-sm">
<span class="material-symbols-outlined text-lg" data-icon="close">close</span>
</button>
</div>
<!-- Add Photo Slot -->
<button class="relative aspect-square rounded-[1rem] border-2 border-dashed border-primary/40 bg-primary-fixed/30 flex flex-col items-center justify-center text-primary bouncy-hover">
<span class="material-symbols-outlined text-3xl mb-1" data-icon="add_a_photo">add_a_photo</span>
<span class="font-label text-xs font-medium">Añadir</span>
</button>
</div>
</section>
<!-- Form Fields Section -->
<section class="space-y-5">
<!-- Name Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label font-bold text-sm text-on-surface ml-3" for="pet_name">Nombre</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/70" data-icon="badge">badge</span>
<input class="w-full bg-surface-container-highest border-none rounded-full py-4 pl-12 pr-4 text-on-surface font-body font-medium focus:ring-2 focus:ring-primary focus:bg-surface-bright transition-all shadow-inner placeholder:text-on-surface-variant/50" id="pet_name" placeholder="Ej. Max, Bella..." type="text" value="Luna"/>
</div>
</div>
<!-- Breed Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label font-bold text-sm text-on-surface ml-3" for="pet_breed">Raza</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-tertiary/70" data-icon="genetics">genetics</span>
<input class="w-full bg-surface-container-highest border-none rounded-full py-4 pl-12 pr-4 text-on-surface font-body font-medium focus:ring-2 focus:ring-tertiary focus:bg-surface-bright transition-all shadow-inner placeholder:text-on-surface-variant/50" id="pet_breed" placeholder="Ej. Labrador, Poodle..." type="text" value="Mestizo / Terrier"/>
</div>
</div>
<!-- Description Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label font-bold text-sm text-on-surface ml-3" for="pet_desc">Descripción</label>
<div class="relative">
<textarea class="w-full bg-surface-container-highest border-none rounded-[1.5rem] py-4 px-5 text-on-surface font-body focus:ring-2 focus:ring-secondary focus:bg-surface-bright transition-all shadow-inner min-h-[120px] resize-none placeholder:text-on-surface-variant/50" id="pet_desc" placeholder="Cuéntanos un poco sobre la personalidad de tu mascota...">Luna es una perrita muy enérgica y juguetona. Le encanta perseguir pelotas y es muy amigable con otros perros. Siempre está buscando mimos.</textarea>
<span class="material-symbols-outlined absolute right-4 bottom-4 text-secondary/40" data-icon="edit_note">edit_note</span>
</div>
</div>
</section>
</main>
<!-- Fixed CTA Area -->
<div class="fixed bottom-0 left-0 w-full p-4 pb-8 bg-gradient-to-t from-background via-background/95 to-transparent z-30 pointer-events-none">
<div class="max-w-md mx-auto pointer-events-auto">
<button class="w-full bg-primary text-on-primary rounded-full py-4 font-headline font-bold text-lg shadow-[0_8px_24px_rgba(224,64,160,0.3)] bouncy-hover flex justify-center items-center gap-2 group">
<span class="material-symbols-outlined group-hover:-translate-y-0.5 transition-transform" data-icon="check_circle">check_circle</span>
                Actualizar Perfil
            </button>
</div>
</div>
</body></html>
