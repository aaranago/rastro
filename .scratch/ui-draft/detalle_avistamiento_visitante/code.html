<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Detalle de Avistamiento</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#e040a0",
                        "on-secondary-fixed-variant": "#4a3068",
                        "inverse-on-surface": "#fef7ff",
                        "secondary": "#7c52aa",
                        "tertiary": "#0096cc",
                        "on-primary": "#ffffff",
                        "surface-container": "#f8eef8",
                        "primary-container": "#f080c0",
                        "primary": "#e040a0",
                        "on-primary-container": "#2e1a28",
                        "primary-fixed-dim": "#f0a0cc",
                        "on-tertiary-container": "#00334d",
                        "on-error-container": "#9b1c1c",
                        "outline-variant": "#dcc8e0",
                        "on-tertiary": "#ffffff",
                        "on-background": "#2e1a28",
                        "inverse-surface": "#2e1a28",
                        "surface-variant": "#f2e8f2",
                        "on-tertiary-fixed-variant": "#005580",
                        "error-container": "#ffe8e8",
                        "on-surface": "#2e1a28",
                        "error": "#e53e3e",
                        "on-primary-fixed": "#3d0028",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#fbf2fb",
                        "secondary-container": "#eedcff",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#e0d6e0",
                        "surface-container-high": "#f2e8f2",
                        "surface-bright": "#fef7ff",
                        "secondary-fixed-dim": "#c8a8e8",
                        "tertiary-container": "#40c0ee",
                        "primary-fixed": "#ffd6ee",
                        "on-secondary-container": "#2e2040",
                        "tertiary-fixed": "#c8eaff",
                        "on-tertiary-fixed": "#001a33",
                        "surface-container-highest": "#ece2ec",
                        "inverse-primary": "#f0a0cc",
                        "on-secondary-fixed": "#1a1030",
                        "outline": "#907898",
                        "on-primary-fixed-variant": "#a02070",
                        "background": "#fef7ff",
                        "tertiary-fixed-dim": "#80d0f0",
                        "on-surface-variant": "#604868",
                        "secondary-fixed": "#eedcff",
                        "surface": "#fef7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["DM Sans", "sans-serif"],
                        "display": ["DM Sans", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "label": ["DM Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
        
        /* Candy micro-interactions */
        .bouncy-hover:hover {
            transform: scale(1.03);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bouncy-active:active {
            transform: scale(0.95);
        }
        
        /* Glassmorphism utility for Candy theme */
        .glass-candy {
            background: rgba(254, 247, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen relative pb-32 overflow-x-hidden">
<!-- Custom Top Bar for Detail View (Task-Focused: Navigation Suppressed) -->
<header class="fixed top-0 left-0 right-0 z-50 p-4 flex justify-between items-center pointer-events-none">
<button class="w-12 h-12 rounded-full glass-candy flex items-center justify-center text-primary shadow-[0_4px_16px_rgba(224,64,160,0.15)] pointer-events-auto bouncy-hover bouncy-active cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<button class="w-12 h-12 rounded-full glass-candy flex items-center justify-center text-secondary shadow-[0_4px_16px_rgba(124,82,170,0.15)] pointer-events-auto bouncy-hover bouncy-active cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-weight="fill">share</span>
</button>
</header>
<!-- Hero Image Area (Photo of sighting) -->
<section class="relative w-full h-[397px]">
<!-- Blur layer for "blurry photo" effect implied by prompt, layered over the actual image -->
<div class="absolute inset-0 bg-secondary/10 backdrop-blur-[2px] z-10"></div>
<img class="absolute inset-0 w-full h-full object-cover object-center z-0" data-alt="A slightly blurry, spontaneous smartphone photo of a medium-sized brown dog trotting along a sunlit city sidewalk. The photo has a candid, slightly out-of-focus quality. The environment features warm, bright daytime lighting with vibrant, playful pops of color in the background, matching a joyful, energetic aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkrhgS-OiFLhjCcKXubJuTpeK9h8BvU6uoHHJ7ceQphkcSpTWhuRqkHRiCjIXo4bx5VzvUVp9YKEgXREaxKVCYbFsEz6GWmYHoEPDy9FdPtZ_VGCLHN9tbEIIoAy0EfdyH2nBuZ29XrV_zHknj0I748Dz1_R6f2R-trjXVLZJ56gqSKvc1oAx5zuA6I8JIIbrupWzVcsbcE3QX5zRsp3CxoSZjXqAI8Mdd2CFQ271dBkKh4dxMHfnVquzA_asEEtNZWUlBUJj7ga4"/>
<!-- Gradient overlay to blend into the content card -->
<div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-surface to-transparent z-10"></div>
</section>
<!-- Main Content Canvas -->
<main class="relative z-20 -mt-12 px-4 md:px-8 max-w-3xl mx-auto">
<!-- Primary Info Card -->
<div class="bg-surface-bright rounded-t-xl rounded-b-xl shadow-[0_-8px_32px_rgba(224,64,160,0.08)] p-6 md:p-8 pt-8 relative border border-white/60">
<!-- Floating Category Badge -->
<div class="absolute -top-5 left-6 shadow-[0_4px_12px_rgba(0,150,204,0.3)] bg-tertiary text-on-tertiary px-4 py-2 rounded-full flex items-center gap-2 border-2 border-surface-bright">
<span class="material-symbols-outlined text-sm">visibility</span>
<span class="font-bold text-xs tracking-widest uppercase">Avistamiento</span>
</div>
<!-- Headline -->
<h1 class="font-headline font-extrabold text-3xl md:text-4xl text-on-surface leading-tight mb-4 tracking-tight">
                Posible Bruno visto en Av. 14 de Septiembre
            </h1>
<!-- Time & Distance Meta -->
<div class="flex flex-wrap items-center gap-4 mb-6">
<div class="flex items-center gap-2 bg-primary-fixed/40 text-on-primary-fixed px-3 py-1.5 rounded-full text-sm font-medium">
<span class="material-symbols-outlined text-[18px] text-primary">schedule</span>
                    Hace 15 minutos
                </div>
<div class="flex items-center gap-2 bg-secondary-container/50 text-on-secondary-container px-3 py-1.5 rounded-full text-sm font-medium">
<span class="material-symbols-outlined text-[18px] text-secondary">distance</span>
                    Aprox. 1.2 km de ti
                </div>
</div>
<hr class="border-surface-dim mb-6"/>
<!-- Detail Section: Observations -->
<div class="mb-8">
<h3 class="font-headline font-bold text-lg text-on-surface-variant mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-secondary">info</span>
                    Detalles Adicionales
                </h3>
<div class="bg-secondary-fixed-dim/20 p-5 rounded-lg border border-secondary-fixed-dim/30 relative overflow-hidden">
<!-- Decorative blob -->
<div class="absolute -right-8 -top-8 w-24 h-24 bg-secondary/10 rounded-full blur-xl"></div>
<p class="font-body text-on-surface text-lg relative z-10 leading-relaxed font-medium">
                        "Se dirigía hacia el puente"
                    </p>
</div>
</div>
<!-- Detail Section: Map -->
<div class="mb-4">
<h3 class="font-headline font-bold text-lg text-on-surface-variant mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary">location_on</span>
                    Ubicación Exacta
                </h3>
<div class="relative w-full h-56 rounded-xl overflow-hidden shadow-[0_8px_24px_rgba(0,150,204,0.15)] group cursor-pointer border-4 border-surface-bright">
<!-- Map Placeholder Image -->
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="A stylized, vibrantly colored digital map interface centered on a specific street. The map uses a joyful Candy theme palette with hot pink route highlights, soft purple accents, and sky blue water features. The overall style is clean and modern with rounded map elements and a prominent, bouncy drop pin indicating a sighting." data-location="Av. 14 de Septiembre, Cochabamba" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVVfhzSPXD7KYpiQetUfNC9pLCNbpFXjtEw7--NC8Y_8s39-imPOh0wneYFrdmuFRM11lvoUVNRC4uZ_szUZVAwUQ_rYWI3RE4XQsT1BHBNYugQGv96hQMFDj5ov6FZaIV9T0zUluXcpOPDmOGS4wkSI26lvdlYcLSxVxyAP919w3Kf-NT3u30zrlmUFch67gahA6mHNWIh3B21xyydTOPe4NcindfMCuk7ghJZU1DzoOCAOIpLXhGdlnfe39L07jIORcyH27kI1w"/>
<!-- Fake Map Pin overlay -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center drop-shadow-xl">
<div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-on-primary animate-bounce">
<span class="material-symbols-outlined" data-weight="fill">pets</span>
</div>
<div class="w-3 h-1 bg-black/20 rounded-[100%] mt-1 blur-[1px]"></div>
</div>
<!-- Overlay gradient for button legibility -->
<div class="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent"></div>
<button class="absolute bottom-3 right-3 bg-surface text-on-surface px-4 py-2 rounded-full text-sm font-bold shadow-lg flex items-center gap-2 bouncy-hover">
<span class="material-symbols-outlined text-[18px]">directions</span>
                        Cómo llegar
                    </button>
</div>
<p class="text-sm text-on-surface-variant mt-2 px-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">my_location</span>
                    Av. 14 de Septiembre esq. Calle innominada
                </p>
</div>
</div>
</main>
<!-- Floating Action Bar (Task Focused Primary Action) -->
<div class="fixed bottom-0 left-0 right-0 p-4 md:p-6 bg-gradient-to-t from-surface via-surface to-transparent z-40 pb-6 md:pb-8 flex justify-center pointer-events-none">
<button class="pointer-events-auto w-full max-w-md bg-primary text-on-primary shadow-[0_8px_24px_rgba(224,64,160,0.35)] rounded-full py-4 px-8 flex items-center justify-center gap-3 bouncy-hover bouncy-active group overflow-hidden relative">
<!-- Button sheen effect -->
<div class="absolute inset-0 w-1/2 h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-[150%] skew-x-[-20deg] group-hover:animate-[sheen_1.5s_ease-in-out_infinite]"></div>
<span class="material-symbols-outlined text-2xl group-hover:rotate-12 transition-transform duration-300">chat_bubble</span>
<span class="font-headline font-bold text-lg tracking-wide">Informar al Dueño</span>
</button>
</div>
<style>
        @keyframes sheen {
            0% { transform: translateX(-150%) skewX(-20deg); }
            100% { transform: translateX(250%) skewX(-20deg); }
        }
    </style>
</body></html>
