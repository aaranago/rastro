<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ubicación del suceso</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#f080c0",
                    "tertiary-container": "#40c0ee",
                    "surface-bright": "#fef7ff",
                    "on-error-container": "#9b1c1c",
                    "error": "#e53e3e",

                    "secondary": "#7c52aa",

                    "on-surface": "#2e1a28",
                    "secondary-fixed": "#eedcff",

                    "background": "#fef7ff",
                    "secondary-container": "#eedcff",
                    "surface": "#fef7ff",
                    "surface-container-highest": "#ece2ec",

                    "on-primary-fixed-variant": "#a02070",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#f0a0cc",
                    "surface-container": "#f8eef8",
                    "inverse-primary": "#f0a0cc",
                    "inverse-surface": "#2e1a28",
                    "on-tertiary-fixed-variant": "#005580",
                    "on-primary-fixed": "#3d0028",
                    "surface-container-high": "#f2e8f2",

            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["DM Sans", "sans-serif"],
                    "display": ["DM Sans", "sans-serif"],
                    "body": ["DM Sans", "sans-serif"],
                    "label": ["DM Sans", "sans-serif"]
            }
          }
        }
      }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; }
        .bouncy-hover { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .bouncy-hover:hover { transform: scale(1.03); }
        .tinted-shadow-primary { box-shadow: 0 4px 16px rgba(224, 64, 160, 0.2); }
        .tinted-shadow-secondary { box-shadow: 0 4px 16px rgba(124, 82, 170, 0.15); }
        .active-ring { border-color: #e040a0; box-shadow: 0 0 0 2px #f080c0; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-background docked full-width top-0 shadow-[0_4px_16px_rgba(224,64,160,0.15)] z-40 sticky">
<div class="flex justify-between items-center w-full px-6 py-4">
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95 transition-all cubic-bezier(0.34,1.56,0.64,1)">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-display text-2xl font-bold tracking-tight text-primary dark:text-primary-fixed-dim">Ubicación del suceso</h1>
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95 transition-all cubic-bezier(0.34,1.56,0.64,1)">
<span class="material-symbols-outlined text-2xl">help_outline</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col p-4 space-y-6 max-w-md mx-auto w-full relative">
<!-- Map Container -->
<div class="relative w-full h-64 rounded-xl overflow-hidden tinted-shadow-primary bouncy-hover group">
<img class="w-full h-full object-cover" data-alt="A stylized, playful street map view with soft pastel colors, emphasizing light pinks and blues. The map style is clean, modern, and friendly, lacking clutter. At the center, a vibrant hot pink location pin marker sits prominently. The mood is joyful and navigational, fitting a light-mode app aesthetic." data-location="Madrid" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6Q8IoeIyh0jmnnVn32pJ8A5ev7st2pS6Lx9Sv1j8g7jTYEEWhufx0BFHmP8QOdkWszxXgR4JgdFcGEyCweRG0Axh8SmcTkNn-zGT4Yk2INv95X9l7Llhyxw8C11AHF7vblPTxQWbsoP2oXmY_Td8-sL52YIMqhQU4_9hQ6AQp-AxWAyMRgSomjKG_BqC0kTVZ5prp4NtyomZlRtPNgOVQEYBC3fPNqexWRqHwbrJmKLVKbsFkHu1R0t7AOlxshmvvvlgk3sUAHk4"/>
<!-- Floating Recenter Button -->
<button class="absolute bottom-4 right-4 bg-surface text-primary rounded-full p-3 shadow-lg hover:scale-105 transition-transform duration-200 active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>
</div>
<!-- Options Container -->
<div class="space-y-4">
<h2 class="font-display text-lg font-bold text-on-surface">Selecciona la precisión</h2>
<!-- Option 1: Approximate -->
<label class="flex items-start p-5 bg-surface-bright rounded-xl border-2 border-surface-dim cursor-pointer tinted-shadow-secondary bouncy-hover transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-fixed has-[:checked]:shadow-[0_4px_16px_rgba(224,64,160,0.2)]">
<input checked="" class="peer sr-only" name="location_precision" type="radio"/>
<div class="flex-shrink-0 mt-1 mr-4 text-secondary peer-checked:text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">blur_on</span>
</div>
<div>
<span class="block font-bold text-lg mb-1 peer-checked:text-on-background">Ubicación aproximada (pública)</span>
<p class="text-on-surface-variant text-sm font-body">Protege tu privacidad mostrando un área general. Ideal para avistamientos rápidos.</p>
</div>
<div class="ml-auto flex-shrink-0 text-outline-variant peer-checked:text-primary">
<span class="material-symbols-outlined mt-1 text-2xl">radio_button_checked</span>
</div>
</label>
<!-- Option 2: Exact -->
<label class="flex items-start p-5 bg-surface-bright rounded-xl border-2 border-surface-dim cursor-pointer tinted-shadow-secondary bouncy-hover transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary-fixed has-[:checked]:shadow-[0_4px_16px_rgba(224,64,160,0.2)]">
<input class="peer sr-only" name="location_precision" type="radio"/>
<div class="flex-shrink-0 mt-1 mr-4 text-secondary peer-checked:text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<span class="block font-bold text-lg mb-1 peer-checked:text-on-background">Punto exacto (público)</span>
<p class="text-on-surface-variant text-sm font-body">Ayuda a los buscadores a encontrar el lugar preciso. Úsalo si es seguro compartirlo.</p>
</div>
<div class="ml-auto flex-shrink-0 text-outline-variant peer-checked:text-primary">
<span class="material-symbols-outlined mt-1 text-2xl">radio_button_unchecked</span>
</div>
</label>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-4 bg-surface dark:bg-on-background shadow-[0_-4px_16px_rgba(224,64,160,0.15)] z-50 md:static md:shadow-none md:bg-transparent md:max-w-md md:mx-auto mt-4">
<button class="w-full bg-primary text-on-primary font-bold text-lg py-4 px-6 rounded-full tinted-shadow-primary bouncy-hover active:scale-95 transition-all flex justify-center items-center gap-2">
            Siguiente
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</body></html>
