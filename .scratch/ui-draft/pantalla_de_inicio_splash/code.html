<style>
        /* Joyful Pop Custom Animations */
        @keyframes bouncy-pop-in {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            60% {
                transform: scale(1.15);
                opacity: 1;
            }
            80% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes bounce-dot {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0px) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .animate-bouncy-pop {
            animation: bouncy-pop-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .animate-float {
            animation: float-icon 4s ease-in-out infinite;
        }

        .loading-dot {
            animation: bounce-dot 0.6s infinite ease-in-out;
        }
        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.15s; }
        .loading-dot:nth-child(3) { animation-delay: 0.3s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<!-- 
  Semantic Shell Mandate: 
  Automatic Suppression applied. This is a Splash Screen (Linear/Transactional).
  TopAppBar and BottomNavBar are deliberately excluded to prioritize the primary intent.
-->
<body class="bg-primary text-on-primary font-body h-screen w-screen overflow-hidden flex flex-col items-center justify-between relative selection:bg-secondary selection:text-on-secondary">
<!-- Top Spacer -->
<div class="flex-1 w-full"></div>
<!-- Center Content Canvas -->
<main class="flex flex-col items-center justify-center z-10 animate-bouncy-pop">
<!-- Icon Container -->
<div class="w-32 h-32 bg-on-primary rounded-full flex items-center justify-center shadow-[0_8px_32px_rgba(46,26,40,0.15)] mb-6 animate-float">
<span class="material-symbols-outlined text-[80px] text-primary" style="font-variation-settings: 'FILL' 1;">
                pets
            </span>
</div>
<!-- Brand Headline -->
<h1 class="font-headline text-6xl md:text-7xl font-black tracking-tight text-on-primary drop-shadow-md">
            Rastro
        </h1>
<!-- Tagline -->
<p class="font-label text-xl md:text-2xl font-medium mt-3 text-primary-fixed tracking-wide">
            Encuentra y cuida
        </p>
</main>
<!-- Bottom Loading Indicator -->
<div class="flex-1 w-full flex items-end justify-center pb-16">
<div class="flex space-x-3 items-center">
<div class="w-4 h-4 rounded-full bg-primary-fixed shadow-[0_4px_12px_rgba(255,214,238,0.4)] loading-dot"></div>
<div class="w-4 h-4 rounded-full bg-primary-fixed shadow-[0_4px_12px_rgba(255,214,238,0.4)] loading-dot"></div>
<div class="w-4 h-4 rounded-full bg-primary-fixed shadow-[0_4px_12px_rgba(255,214,238,0.4)] loading-dot"></div>
</div>
</div>
<!-- Decorative subtle background elements (Joyful Pop aesthetic) -->
<div class="absolute top-10 left-10 w-24 h-24 rounded-full bg-primary-fixed-dim opacity-20 blur-2xl"></div>
<div class="absolute bottom-20 right-10 w-40 h-40 rounded-full bg-secondary-container opacity-20 blur-3xl"></div>
<script>
        // Minimal interaction to simulate splash screen completion
        document.addEventListener('DOMContentLoaded', () => {
            // In a real app, this would route to the main screen after loading.
            setTimeout(() => {
                const dots = document.querySelectorAll('.loading-dot');
                dots.forEach(dot => dot.style.animationPlayState = 'paused');
            }, 3000);
        });
    </script>
</body></html>
