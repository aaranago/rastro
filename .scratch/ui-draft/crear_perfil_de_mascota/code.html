<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crear Perfil de Mascota - Rastro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#2e1a28",
                        "on-error-container": "#9b1c1c",
                        "inverse-primary": "#f0a0cc",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#40c0ee",
                        "on-secondary-fixed-variant": "#4a3068",
                        "surface-container-low": "#fbf2fb",
                        "tertiary-fixed-dim": "#80d0f0",
                        "surface-container-high": "#f2e8f2",
                        "surface": "#fef7ff",
                        "on-background": "#2e1a28",
                        "background": "#fef7ff",
                        "on-secondary-fixed": "#1a1030",
                        "on-tertiary-fixed-variant": "#005580",
                        "on-primary-fixed": "#3d0028",
                        "on-tertiary-fixed": "#001a33",
                        "error-container": "#ffe8e8",
                        "secondary-container": "#eedcff",
                        "tertiary-fixed": "#c8eaff",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#00334d",
                        "on-surface": "#2e1a28",
                        "secondary": "#7c52aa",
                        "on-surface-variant": "#604868",
                        "outline": "#907898",
                        "surface-container-highest": "#ece2ec",
                        "secondary-fixed": "#eedcff",
                        "on-secondary-container": "#2e2040",
                        "primary": "#e040a0",
                        "surface-bright": "#fef7ff",
                        "surface-container": "#f8eef8",
                        "tertiary": "#0096cc",
                        "primary-container": "#f080c0",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#f2e8f2",
                        "on-primary-fixed-variant": "#a02070",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#fef7ff",
                        "primary-fixed": "#ffd6ee",
                        "surface-dim": "#e0d6e0",
                        "secondary-fixed-dim": "#c8a8e8",
                        "surface-tint": "#e040a0",
                        "primary-fixed-dim": "#f0a0cc",
                        "error": "#e53e3e",
                        "outline-variant": "#dcc8e0",
                        "inverse-surface": "#2e1a28"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["DM Sans", "sans-serif"],
                        "display": ["DM Sans", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "label": ["DM Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; }
        .candy-shadow { box-shadow: 0 4px 16px rgba(224, 64, 160, 0.15); }
        .candy-shadow-hover:hover { box-shadow: 0 6px 20px rgba(224, 64, 160, 0.25); transform: scale(1.03); transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .active-scale { transition: transform 0.15s ease-out; }
        .active-scale:active { transform: scale(0.95); }
        
        /* Custom scrollbar for horizontal photo list */
        .photo-scroll::-webkit-scrollbar { height: 6px; }
        .photo-scroll::-webkit-scrollbar-track { background: transparent; }
        .photo-scroll::-webkit-scrollbar-thumb { background: rgba(144, 120, 152, 0.3); border-radius: 9999px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-24 selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-background shadow-[0_4px_16px_rgba(224,64,160,0.15)] sticky top-0 z-40 w-full flex justify-between items-center px-6 py-4">
<button class="text-primary hover:scale-105 transition-transform duration-200 active:scale-95 ease-out">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<h1 class="font-display font-bold text-on-surface text-2xl tracking-tight">Crear Perfil</h1>
<div class="w-6 h-6"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content -->
<main class="px-6 py-8 max-w-lg mx-auto">
<form class="space-y-8">
<!-- Photo Upload Area -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="font-headline font-bold text-xl text-primary">Fotos de tu mascota</h2>
<span class="text-sm font-label text-on-surface-variant font-medium">0/5 subidas</span>
</div>
<div class="flex gap-4 overflow-x-auto pb-4 photo-scroll -mx-6 px-6 snap-x">
<!-- Main Upload Button -->
<label class="shrink-0 w-32 h-32 bg-surface-container rounded-lg border-2 border-dashed border-primary/30 flex flex-col items-center justify-center text-primary cursor-pointer hover:border-primary hover:bg-primary-fixed/30 transition-colors candy-shadow-hover snap-start active-scale">
<span class="material-symbols-outlined text-3xl mb-1">add_a_photo</span>
<span class="text-xs font-bold">Añadir foto</span>
<input accept="image/*" class="hidden" multiple="" type="file"/>
</label>
<!-- Placeholder slots to indicate limit -->
<div class="shrink-0 w-32 h-32 bg-surface-variant rounded-lg flex items-center justify-center text-outline-variant snap-start opacity-50">
<span class="material-symbols-outlined">image</span>
</div>
<div class="shrink-0 w-32 h-32 bg-surface-variant rounded-lg flex items-center justify-center text-outline-variant snap-start opacity-50">
<span class="material-symbols-outlined">image</span>
</div>
</div>
<p class="text-xs text-on-surface-variant text-center">Sube hasta 5 fotos para ayudar a identificar a tu mascota más fácilmente.</p>
</section>
<!-- Basic Info Section -->
<section class="bg-surface-container-lowest p-6 rounded-lg candy-shadow space-y-6">
<h3 class="font-headline font-bold text-lg text-secondary flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">pets</span>
                    Datos Básicos
                </h3>
<!-- Name Input -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_name">Nombre</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full py-4 px-6 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-inner" id="pet_name" placeholder="Ej. Firulais" type="text"/>
<span class="material-symbols-outlined absolute right-5 top-4 text-outline">badge</span>
</div>
</div>
<!-- Type Dropdown -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_type">Tipo de Mascota</label>
<div class="relative">
<select class="w-full bg-surface-container-high border-none rounded-full py-4 px-6 appearance-none text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all shadow-inner cursor-pointer font-body" id="pet_type">
<option class="text-outline" disabled="" selected="" value="">Selecciona el tipo</option>
<option value="perro">Perro</option>
<option value="gato">Gato</option>
<option value="ave">Ave</option>
<option value="roedor">Roedor</option>
<option value="otro">Otro</option>
</select>
<span class="material-symbols-outlined absolute right-5 top-4 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Breed Input -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_breed">Raza (Opcional)</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-full py-4 px-6 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-inner" id="pet_breed" placeholder="Ej. Labrador" type="text"/>
<span class="material-symbols-outlined absolute right-5 top-4 text-outline">category</span>
</div>
</div>
</section>
<!-- Details Section -->
<section class="bg-surface-container-lowest p-6 rounded-lg candy-shadow space-y-6">
<h3 class="font-headline font-bold text-lg text-tertiary flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">info</span>
                    Detalles y Marcas
                </h3>
<!-- Description Textarea -->
<div class="space-y-2">
<label class="block font-label font-bold text-sm text-on-surface pl-2" for="pet_description">Descripción o Marcas Distintivas</label>
<textarea class="w-full bg-surface-container-high border-none rounded-lg py-4 px-6 text-on-surface focus:ring-2 focus:ring-tertiary focus:bg-surface-container-lowest transition-all placeholder:text-outline shadow-inner resize-none" id="pet_description" placeholder="Describe cualquier marca especial, color de collar, o detalles que ayuden a identificarla..." rows="4"></textarea>
</div>
</section>
<!-- Main CTA -->
<div class="pt-4 pb-8">
<button class="w-full bg-primary text-on-primary font-bold text-lg py-5 px-8 rounded-full candy-shadow-hover active-scale flex items-center justify-center gap-2 group" type="button">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" style="font-variation-settings: 'FILL' 1;">save</span>
                    Guardar Mascota
                </button>
</div>
</form>
</main>
<!-- Contextual FAB Suppression: Hide global nav items as this is a transactional creation screen -->
</body></html>
