<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rastro - FAB Action Sheet</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: DM Sans -->

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration (Candy) -->

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#c8eaff",

                    "on-tertiary-container": "#00334d",
                    "on-secondary": "#ffffff",
                    "surface": "#fef7ff",
                    "surface-container-lowest": "#ffffff",
                    "background": "#fef7ff",
                    "secondary": "#7c52aa",
                    "primary-fixed": "#ffd6ee",
                    "surface-container": "#f8eef8",
                    "secondary-container": "#eedcff",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2e1a28",
                    "on-secondary-container": "#2e2040",
                    "error": "#e53e3e",
                    "on-surface-variant": "#604868",
                    "tertiary": "#0096cc",
                    "tertiary-container": "#40c0ee",
                    "primary-fixed-dim": "#f0a0cc",
                    "on-primary-fixed": "#3d0028",
                    "inverse-primary": "#f0a0cc",
                    "surface-variant": "#f2e8f2",
                    "primary-container": "#f080c0",
                    "on-background": "#2e1a28",
                    "secondary-fixed": "#eedcff",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed-dim": "#80d0f0",
                    "inverse-on-surface": "#fef7ff",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#ece2ec",
                    "primary": "#e040a0",
                    "outline-variant": "#dcc8e0",
                    "on-primary-container": "#2e1a28",
                    "on-tertiary-fixed-variant": "#005580",
                    "secondary-fixed-dim": "#c8a8e8",
                    "on-tertiary-fixed": "#001a33",
                    "surface-bright": "#fef7ff",
                    "surface-tint": "#e040a0",
                    "outline": "#907898",
                    "on-error-container": "#9b1c1c",
                    "on-secondary-fixed": "#1a1030",
                    "surface-container-high": "#f2e8f2",
                    "on-surface": "#2e1a28",
                    "on-secondary-fixed-variant": "#4a3068",
                    "error-container": "#ffe8e8"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": ["DM Sans", "sans-serif"],
                    "display": ["DM Sans", "sans-serif"],
                    "body": ["DM Sans", "sans-serif"],
                    "label": ["DM Sans", "sans-serif"]
            },
            "fontSize": {}
          },
        },
      }

<style>
        /* Custom bouncy transition for Candy theme */
        .bouncy-hover {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }
        .bouncy-hover:hover {
            transform: scale(1.05);
        }
        .bouncy-hover:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }
        
        /* Action Sheet Entrance Animation */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        /* Staggered delays for child elements */
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-250 { animation-delay: 250ms; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body h-screen w-full overflow-hidden relative selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Mock Background App State (Map View underneath the Action Sheet) -->
<div class="absolute inset-0 z-0 select-none">
<div class="bg-cover bg-center w-full h-full opacity-50 blur-[2px]" data-alt="A stylized, bright, minimal 3D map interface of a vibrant city neighborhood, rendered in light mode with playful rounded roads and soft pastel green parks. A few cute, brightly colored map pins are scattered around. The lighting is soft and cheerful." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBn-IZCPe5DCde98dzjShotwv5-YGBEwfZeFQ_ZoBZVMjyYGu4llRf7yJofUUmzDciAmdjLcAPgiQJZx2GCvxi-nxEZ8C0UrP4euHamq7zkiqCdNnCDpi3pj4oBCcCduRh8M_IMFs74wdjubfJ0Ki9vY8wZn9JAfvHh9ChngTtb2X9R1NveYeWPQTOASGeanExnx9SiAO7heGj7Y5n13ZBR2frGrG2MjoeRBQBdH95IuZVuenmOu1tbiMLcTqL4SImr9QCjQ6FvC8M')"></div>
</div>
<!-- TopAppBar (Shared Component) -->
<!-- Applying exact styles from JSON: style_shell_layout, style_bg_color, style_separation_logic, style_component_shape -->
<header class="flex justify-between items-center px-4 h-16 w-full z-10 bg-background dark:bg-background docked full-width top-0 absolute">
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 0;">pets</span>
</button>
<h1 class="font-headline text-headline-sm font-bold text-2xl font-black text-primary dark:text-primary-fixed-dim tracking-tight">Rastro</h1>
<button class="text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 0;">search</span>
</button>
</header>
<!-- FAB Action Sheet Overlay -->
<!-- Triggered state: covers the screen with a vibrant blur -->
<div class="fixed inset-0 z-40 bg-surface/80 backdrop-blur-xl flex flex-col justify-end items-center pb-32 px-4 transition-all duration-300">
<!-- Action Buttons Container (Bento/Grid Layout) -->
<div class="w-full max-w-md grid grid-cols-1 gap-4 mb-8">
<!-- Button 1: Reportar pérdida (Primary Pink) -->
<button class="w-full bouncy-hover animate-pop-in delay-100 bg-primary text-on-primary rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(224,64,160,0.3)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-white/20 p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">campaign</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Reportar pérdida</span>
<span class="material-symbols-outlined ml-auto relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Button 2: Reportar encontrada (Tertiary Blue) -->
<button class="w-full bouncy-hover animate-pop-in delay-150 bg-tertiary text-on-tertiary rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(0,150,204,0.3)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-white/20 p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">volunteer_activism</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Reportar encontrada</span>
<span class="material-symbols-outlined ml-auto relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Button 3: Reportar avistamiento (Secondary Purple) -->
<button class="w-full bouncy-hover animate-pop-in delay-200 bg-secondary text-on-secondary rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(124,82,170,0.3)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-white/20 p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Reportar avistamiento</span>
<span class="material-symbols-outlined ml-auto relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Button 4: Dar en adopción (Primary Container / Soft Pink) -->
<button class="w-full bouncy-hover animate-pop-in delay-250 bg-primary-container text-on-primary-container rounded-full px-6 py-5 flex items-center shadow-[0_8px_24px_rgba(240,128,192,0.3)] group relative overflow-hidden border-2 border-primary-fixed-dim">
<div class="absolute inset-0 bg-white/40 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out rounded-full"></div>
<div class="bg-primary/10 text-primary p-3 rounded-full mr-4 relative z-10">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">home_health</span>
</div>
<span class="font-headline font-bold text-lg relative z-10 tracking-wide">Dar en adopción</span>
<span class="material-symbols-outlined ml-auto text-primary relative z-10 opacity-70 group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
<!-- Global FAB (Active/Open State -> Close Action) -->
<div class="absolute bottom-24 flex justify-center w-full z-50 animate-pop-in delay-100">
<button class="bg-surface text-on-surface p-5 rounded-full shadow-[0_8px_24px_rgba(0,0,0,0.12)] bouncy-hover flex items-center justify-center border-2 border-surface-variant">
<span class="material-symbols-outlined text-3xl text-on-surface-variant" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
</div>
<!-- BottomNavBar (Shared Component) -->
<!-- Hidden on md screens per rules. Using exact classes from JSON. -->
<!-- Active State Logic: 'Cerca' (Explore/Map) is the most logical active tab when a generic global reporting FAB is tapped, as it usually originates from the main map view. -->
<nav class="fixed bottom-0 left-0 w-full z-30 flex justify-around items-center px-2 pb-4 pt-2 bg-surface dark:bg-surface-container-low shadow-lg shadow-[0_-4px_16px_rgba(224,64,160,0.15)] rounded-t-lg md:hidden">
<!-- Active Tab: Cerca -->
<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-5 py-1.5 active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-label text-xs font-medium">Cerca</span>
</button>
<!-- Inactive Tab: Actividad -->
<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 active:scale-90 transition-transform duration-150 rounded-full">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">notifications</span>
<span class="font-label text-xs font-medium">Actividad</span>
</button>
<!-- Placeholder space for FAB in standard view (not clickable here, just structural) -->
<div class="w-16"></div>
<!-- Inactive Tab: Recursos -->
<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 active:scale-90 transition-transform duration-150 rounded-full">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">menu_book</span>
<span class="font-label text-xs font-medium">Recursos</span>
</button>
<!-- Inactive Tab: Perfil -->
<button class="hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 active:scale-90 transition-transform duration-150 rounded-full">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 0;">person</span>
<span class="font-label text-xs font-medium">Perfil</span>
</button>
</nav>
</body></html>
