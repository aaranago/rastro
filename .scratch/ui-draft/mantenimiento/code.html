<html class="light" lang="es"><head>
<meta charset="utf-8"/>

                        "secondary-fixed": "#eedcff",

                    "borderRadius": {

                    "fontFamily": {
                        "headline": ["DM Sans", "sans-serif"],

                        "body": ["DM Sans", "sans-serif"],

                    }
                }
            }
        }

<style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        
        .bouncy-element {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .bouncy-element:hover {
            transform: scale(1.05);
        }

        .float-animation {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }

        @keyframes pulse-soft {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden bg-background">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary opacity-10 rounded-full blur-3xl pulse-soft z-0 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-secondary opacity-10 rounded-full blur-3xl pulse-soft z-0 pointer-events-none" style="animation-delay: 1.5s;"></div>
<div class="absolute top-[20%] right-[10%] w-32 h-32 bg-tertiary opacity-10 rounded-full blur-2xl float-animation z-0 pointer-events-none"></div>
<main class="w-full max-w-md px-6 z-10 flex flex-col items-center text-center">
<!-- Brand Logo (TopAppBar styling reference) -->
<div class="mb-12">
<h1 class="text-3xl font-black text-primary tracking-tight">Rastro</h1>
</div>
<!-- Illustration Canvas -->
<div class="relative w-64 h-64 mb-8 float-animation">
<!-- Decorative circle behind image -->
<div class="absolute inset-0 bg-primary-fixed rounded-full shadow-[0_8px_32px_rgba(224,64,160,0.15)] z-0"></div>
<img class="absolute inset-0 w-full h-full object-contain rounded-full z-10 p-4" data-alt="A highly detailed, vibrant, and playful 3D illustration of an adorable, fluffy dog wearing a bright yellow construction hard hat and holding a wrench in its mouth. The setting is a clean, bright, white-pink light mode environment matching a joyful pop aesthetic. The lighting is soft, high-key, and cheerful, highlighting the saturated hot pink and sky blue accent colors scattered around tiny playful construction blocks." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCu9DdNPIg09ZoOI8zUtQ2CC1Ug-NIv-zRm4V2wVaVnenqVt9DOeGQkTwTuZCz78ydmjyaoEscFE0i-eYC5iDTa_8UqVfHO8h6fkiAPnGIc7cKUukI8RToFd2Y7ov-8FwCJO-r4o_crPKisSqpunjfhBpbNXCBG_Bj-CI3A7-qdRkWA6V-_qNQSZvhGLC7juAoSjt0pNXaZ9c51FFb_VgGQQg5FyBF_yQviUBPUrxDwZ1JW501pzWtkd-rmHtd7dTpgpw47K-swPvU"/>
<!-- Floating icons around the main illustration -->
<div class="absolute -top-4 -right-4 bg-surface rounded-full p-3 shadow-[0_4px_16px_rgba(124,82,170,0.2)] z-20 bouncy-element">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">build</span>
</div>
<div class="absolute bottom-4 -left-4 bg-surface rounded-full p-3 shadow-[0_4px_16px_rgba(0,150,204,0.2)] z-20 bouncy-element" style="animation-delay: 0.5s;">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">handyman</span>
</div>
</div>
<!-- Typography Content -->
<div class="space-y-4 mb-10">
<h2 class="font-headline text-3xl font-bold text-on-surface">Estamos mejorando Rastro</h2>
<p class="font-body text-base text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                Estamos realizando tareas de mantenimiento para brindarte un mejor servicio. Volveremos muy pronto.
            </p>
</div>
<!-- Progress/Loading Indicator -->
<div class="w-48 h-3 bg-surface-variant rounded-full overflow-hidden mb-12 shadow-inner">
<div class="h-full bg-primary w-1/3 rounded-full relative">
<div class="absolute top-0 right-0 bottom-0 left-0 bg-white opacity-20" style="animation: shimmer 2s infinite linear; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);"></div>
</div>
</div>
</main>
<style>
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</body></html>
