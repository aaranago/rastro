<style>
        .bounce-transition {
            transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col antialiased selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-background text-primary dark:text-primary-fixed-dim font-display text-2xl font-bold tracking-tight shadow-[0_4px_16px_rgba(224,64,160,0.15)] flex justify-between items-center w-full px-6 py-4 sticky top-0 z-50">
<button aria-label="Menu" class="hover:scale-105 active:scale-95 transition-all bounce-transition flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant text-primary">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">pets</span>
</button>
<span class="text-2xl font-black text-primary dark:text-primary-fixed-dim tracking-tighter">Rastro</span>
<button aria-label="Notifications" class="hover:scale-105 active:scale-95 transition-all bounce-transition flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant text-primary">
<span class="material-symbols-outlined text-[28px]">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-6 py-8 flex flex-col gap-8 max-w-md mx-auto w-full relative">
<!-- Header Text -->
<div class="flex flex-col gap-2">
<h1 class="text-3xl font-headline font-bold text-on-surface tracking-tight">Selecciona tu mascota</h1>
<p class="text-on-surface-variant font-body text-base">Elige un perfil para ver su actividad o crea uno nuevo para empezar a rastrear.</p>
</div>
<!-- Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Create Pet Card -->
<button class="flex flex-col items-center justify-center gap-4 p-6 rounded-lg border-[3px] border-dashed border-primary-fixed-dim bg-surface-bright hover:bg-primary-fixed/30 hover:border-primary active:scale-95 transition-all bounce-transition duration-300 group aspect-square">
<div class="w-16 h-16 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center group-hover:scale-110 group-hover:bg-primary group-hover:text-on-primary transition-all bounce-transition duration-300 shadow-[0_4px_12px_rgba(224,64,160,0.2)]">
<span class="material-symbols-outlined text-3xl font-bold">add</span>
</div>
<span class="font-label font-bold text-primary text-base">Crear perfil</span>
</button>
<!-- Pet Card 1: Bruno -->
<button class="pet-card relative flex flex-col items-center justify-center gap-3 p-6 rounded-lg bg-surface shadow-[0_4px_16px_rgba(224,64,160,0.06)] hover:shadow-[0_8px_24px_rgba(224,64,160,0.15)] hover:-translate-y-1 active:scale-95 transition-all bounce-transition duration-300 aspect-square overflow-hidden" onclick="selectPet(this)">
<!-- Background decoration -->
<div class="absolute -top-10 -right-10 w-24 h-24 bg-tertiary-fixed rounded-full opacity-50 blur-xl"></div>
<div class="w-20 h-20 rounded-full overflow-hidden border-4 border-surface shadow-[0_4px_12px_rgba(0,0,0,0.1)] relative z-10">
<img class="w-full h-full object-cover" data-alt="A playful golden retriever puppy looking directly at the camera in a brightly lit park. The image is styled with a joyful pop aesthetic, featuring vibrant, saturated colors and warm tones. The background is slightly blurred to emphasize the dog. The lighting is sunny and high-key, creating a cheerful and energetic mood that perfectly complements a modern, playful UI with pink accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCewgL3gJ00LCO5lcMW8I2vul14mrrNm2GeNaOTNZdMfOpGTViAk6i3rDzd3XtA3xfDYTm0MWNib9xn3GXjDUgcejvtSbhHjbTBMLfWsupLguqJTaZnh7oFNEsK3eET9UkvPfuiT74SCcg6Ez_RIiLQo4HuJ08LK_ZLCSD8zJjpYjR4RmfMmSTiM4OH7BJwc0ytfiUb9fCPio9xH-I8hR6cw5ftnAZ8ivnvcUVICmM1hMijoY9nELYTtbUM0URsZ71dy4NiRcWtmmM"/>
</div>
<span class="font-label font-bold text-on-surface text-lg relative z-10">Bruno</span>
<!-- Selection State Elements -->
<div class="selection-ring absolute inset-0 border-[3px] border-primary rounded-lg opacity-0 scale-105 transition-all duration-300 ease-out pointer-events-none"></div>
<div class="check-icon absolute top-3 right-3 w-7 h-7 bg-primary rounded-full text-on-primary flex items-center justify-center opacity-0 scale-50 transition-all bounce-transition duration-300 shadow-md pointer-events-none z-20">
<span class="material-symbols-outlined text-sm font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Pet Card 2: Luna -->
<button class="pet-card relative flex flex-col items-center justify-center gap-3 p-6 rounded-lg bg-surface shadow-[0_4px_16px_rgba(224,64,160,0.06)] hover:shadow-[0_8px_24px_rgba(224,64,160,0.15)] hover:-translate-y-1 active:scale-95 transition-all bounce-transition duration-300 aspect-square overflow-hidden" onclick="selectPet(this)">
<!-- Background decoration -->
<div class="absolute -bottom-8 -left-8 w-24 h-24 bg-secondary-fixed rounded-full opacity-50 blur-xl"></div>
<div class="w-20 h-20 rounded-full overflow-hidden border-4 border-surface shadow-[0_4px_12px_rgba(0,0,0,0.1)] relative z-10">
<img class="w-full h-full object-cover" data-alt="A curious black cat with bright green eyes sitting elegantly on a vibrant pink velvet cushion. The setting is indoors with soft, diffused natural lighting that highlights the cat's sleek fur. The overall visual style is high-contrast and saturated, embracing a playful and energetic pop aesthetic. The mood is charming and friendly, fitting seamlessly into a colorful app interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLpd9xMrXST7s6G1Kg7x2lcqcZz6_IMMaBJadO1cy2BxQMGnqYps23DtpZN3U3HM2b8DJTkLNSSwOMc4Fw7uXzAthnb20RAHumzKUkFKTghTCQdBx5eHppyoCzfR7Tyb8gW8oEVNsZNEdCSYRJm9lcjLtWnec0ABeu8Eg5ePs3YOCyfXKoLi75p0R6vbnLwdcss6SKpoKvm7V7rKZJzCxWrPjCq-1SNzaRExUmeOk8PxGZsGhB5Qlf9xrTPp1QGI8P5QbEGrxX6N8"/>
</div>
<span class="font-label font-bold text-on-surface text-lg relative z-10">Luna</span>
<!-- Selection State Elements -->
<div class="selection-ring absolute inset-0 border-[3px] border-primary rounded-lg opacity-0 scale-105 transition-all duration-300 ease-out pointer-events-none"></div>
<div class="check-icon absolute top-3 right-3 w-7 h-7 bg-primary rounded-full text-on-primary flex items-center justify-center opacity-0 scale-50 transition-all bounce-transition duration-300 shadow-md pointer-events-none z-20">
<span class="material-symbols-outlined text-sm font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
</div>
<!-- Spacer for fixed bottom area -->
<div class="h-24"></div>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-8 pt-12 bg-gradient-to-t from-background via-background to-transparent pointer-events-none z-40 max-w-md mx-auto right-0">
<button class="w-full bg-surface-variant text-outline-variant font-label font-bold text-lg py-4 rounded-full pointer-events-auto transition-all duration-300 flex justify-center items-center gap-2" disabled="" id="btn-siguiente">
            Siguiente <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<script>
        function selectPet(selectedCard) {
            const cards = document.querySelectorAll('.pet-card');
            const btn = document.getElementById('btn-siguiente');

            // Reset all cards visually
            cards.forEach(card => {
                card.classList.remove('bg-primary-fixed/40');
                card.classList.add('bg-surface');
                card.querySelector('.selection-ring').classList.remove('opacity-100', 'scale-100');
                card.querySelector('.selection-ring').classList.add('opacity-0', 'scale-105');
                card.querySelector('.check-icon').classList.remove('opacity-100', 'scale-100');
                card.querySelector('.check-icon').classList.add('opacity-0', 'scale-50');
            });

            // Activate the selected card
            selectedCard.classList.remove('bg-surface');
            selectedCard.classList.add('bg-primary-fixed/40');
            selectedCard.querySelector('.selection-ring').classList.remove('opacity-0', 'scale-105');
            selectedCard.querySelector('.selection-ring').classList.add('opacity-100', 'scale-100');
            selectedCard.querySelector('.check-icon').classList.remove('opacity-0', 'scale-50');
            selectedCard.querySelector('.check-icon').classList.add('opacity-100', 'scale-100');

            // Enable and style the "Siguiente" button with springy pop
            if (btn.disabled) {
                btn.disabled = false;
                btn.className = "w-full bg-primary text-on-primary shadow-[0_8px_24px_rgba(224,64,160,0.3)] font-label font-bold text-lg py-4 rounded-full pointer-events-auto hover:scale-[1.03] active:scale-95 transition-all bounce-transition flex justify-center items-center gap-2 cursor-pointer";
                
                // Add a small initial pop animation to draw attention
                btn.animate([
                    { transform: 'scale(1)' },
                    { transform: 'scale(1.05)' },
                    { transform: 'scale(1)' }
                ], {
                    duration: 400,
                    easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)'
                });
            }
        }
    </script>
</body></html>
