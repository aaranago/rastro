<style>
        body { font-family: 'DM Sans', sans-serif; }
        .bouncy-hover { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bouncy-hover:hover { transform: scale(1.05); }
        .bouncy-hover:active { transform: scale(0.95); }
        .float-anim { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col pt-20 pb-24 md:pb-0 font-body selection:bg-primary/20 selection:text-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-background shadow-[0_4px_16px_rgba(224,64,160,0.15)] flex justify-between items-center px-6 py-4">
<button class="text-primary dark:text-primary hover:scale-105 transition-transform duration-200 ease-out active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pets</span>
</button>
<h1 class="text-headline-lg font-display font-black text-primary dark:text-primary tracking-tighter">Rastro</h1>
<button class="text-on-surface-variant dark:text-on-surface-variant hover:scale-105 transition-transform duration-200 ease-out active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant relative">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-1.5 right-1.5 w-2 h-2 bg-primary rounded-full"></span>
</button>
</header>
<!-- Main Content: Empty State -->
<main class="flex-grow flex flex-col items-center justify-center px-6 relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-1/4 left-10 w-24 h-24 bg-primary/10 rounded-full blur-xl animate-pulse"></div>
<div class="absolute bottom-1/4 right-10 w-32 h-32 bg-secondary/10 rounded-full blur-xl animate-pulse" style="animation-delay: 1s;"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] aspect-square bg-[radial-gradient(circle_at_center,theme(colors.primary-fixed/0.2)_0%,transparent_60%)] -z-10 pointer-events-none"></div>
<!-- Glassmorphism Container -->
<div class="relative bg-surface/60 backdrop-blur-md border border-outline-variant/30 rounded-xl p-8 max-w-md w-full text-center shadow-[0_8px_32px_rgba(224,64,160,0.05)] transform transition-all hover:shadow-[0_12px_48px_rgba(224,64,160,0.1)]">
<!-- Playful Illustration Area -->
<div class="w-48 h-48 mx-auto mb-6 relative float-anim">
<div class="absolute inset-0 bg-secondary-container rounded-full opacity-50 blur-lg"></div>
<img class="relative w-full h-full object-contain drop-shadow-xl z-10" data-alt="A playful, vibrant 3D rendering of a cartoonish dog holding a giant magnifying glass, looking confused but cute. The style is joyful pop, with saturated colors matching the ui palette (hot pinks, purples, light blues) against a light pink background. Soft studio lighting, pill-shaped elements in the background, bouncy aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAw3oKhUQ6xb5BiVXoPYFSkF3lXGqx7VjeSlFl1SaGc7w1pTXWy8IjjlfDG7-7ze0I5SF3adnuZQneVzDa_ZTTOtbO731EvPedD57rLKyyd_AZW2IxAL_K65CMDcMVMwciGp1cDpOJ_2kcea0ySlursJXTPiWNhfPp4FOWihMSbO5hA9FsCj0_Y1iMKs8GY3ahS9dii5TjwyfB1nf2BLpIjzRKFFaFQ8_tcR_RXqSfSG0Pvq9WIOoCenF_VIgW4YhuBZX0g_HbXpKA"/>
</div>
<h2 class="font-display font-bold text-2xl mb-3 text-on-background">No hay reportes cerca de ti en este momento</h2>
<p class="text-on-surface-variant mb-8 text-base">
                Parece que esta zona está tranquila. Prueba expandiendo tu radio de búsqueda o vuelve a consultar más tarde.
            </p>
<button class="bouncy-hover w-full bg-primary text-on-primary font-label font-bold py-4 px-6 rounded-full shadow-[0_4px_16px_rgba(224,64,160,0.2)] flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:rotate-12 transition-transform">radar</span>
                Cambiar radio
            </button>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-surface dark:bg-surface-container border-t border-outline-variant shadow-[0_-4px_16px_rgba(124,82,170,0.1)] rounded-t-xl">
<!-- Active: Cerca -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-5 py-1.5 transition-all duration-300 ease-out shadow-[0_4px_12px_rgba(224,64,160,0.2)] group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform duration-150" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-label font-bold text-label-small mt-1 text-primary font-black">Cerca</span>
</button>
<!-- Inactive: Actividad -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-secondary-container/50 rounded-full transition-colors group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform duration-150">pets</span>
<span class="font-label font-bold text-label-small mt-1">Actividad</span>
</button>
<!-- Inactive: Recursos -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-secondary-container/50 rounded-full transition-colors group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform duration-150">menu_book</span>
<span class="font-label font-bold text-label-small mt-1">Recursos</span>
</button>
<!-- Inactive: Perfil -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-secondary-container/50 rounded-full transition-colors group">
<span class="material-symbols-outlined group-active:scale-90 transition-transform duration-150">person</span>
<span class="font-label font-bold text-label-small mt-1">Perfil</span>
</button>
</nav>
<script>
        // Simple script to handle bottom nav visual feedback on click (client-side only simulation)
        document.querySelectorAll('nav button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.9)';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'scale(1)';
            });
        });
    </script>
