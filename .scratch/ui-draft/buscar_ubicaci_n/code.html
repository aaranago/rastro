<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rastro - Buscar Lugar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#0096cc",
                        "surface-container-low": "#fbf2fb",
                        "secondary-fixed-dim": "#c8a8e8",
                        "on-tertiary-container": "#00334d",
                        "surface-dim": "#e0d6e0",
                        "error-container": "#ffe8e8",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#ffd6ee",
                        "inverse-surface": "#2e1a28",
                        "secondary-fixed": "#eedcff",
                        "on-primary-fixed-variant": "#a02070",
                        "on-primary-fixed": "#3d0028",
                        "on-background": "#2e1a28",
                        "outline-variant": "#dcc8e0",
                        "on-primary-container": "#2e1a28",
                        "background": "#fef7ff",
                        "tertiary-container": "#40c0ee",
                        "on-tertiary-fixed-variant": "#005580",
                        "primary-container": "#f080c0",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#4a3068",
                        "surface-bright": "#fef7ff",
                        "secondary-container": "#eedcff",
                        "on-secondary-container": "#2e2040",
                        "surface-container": "#f8eef8",
                        "inverse-primary": "#f0a0cc",
                        "surface-tint": "#e040a0",
                        "on-error-container": "#9b1c1c",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#ece2ec",
                        "on-surface-variant": "#604868",
                        "inverse-on-surface": "#fef7ff",
                        "tertiary-fixed-dim": "#80d0f0",
                        "on-tertiary-fixed": "#001a33",
                        "error": "#e53e3e",
                        "surface-container-high": "#f2e8f2",
                        "primary-fixed-dim": "#f0a0cc",
                        "on-secondary-fixed": "#1a1030",
                        "primary": "#e040a0",
                        "tertiary-fixed": "#c8eaff",
                        "surface-variant": "#f2e8f2",
                        "on-surface": "#2e1a28",
                        "surface": "#fef7ff",
                        "on-secondary": "#ffffff",
                        "secondary": "#7c52aa",
                        "outline": "#907898"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["DM Sans"],
                        "display": ["DM Sans"],
                        "body": ["DM Sans"],
                        "label": ["DM Sans"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1; }
        
        /* Bouncy interactions */
        .bouncy-hover { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bouncy-hover:hover { transform: scale(1.03); }
        .bouncy-active:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* Tinted shadows */
        .shadow-pink { box-shadow: 0 4px 16px rgba(224, 64, 160, 0.15); }
        .shadow-purple { box-shadow: 0 4px 16px rgba(124, 82, 170, 0.15); }
        .shadow-blue { box-shadow: 0 4px 16px rgba(0, 150, 204, 0.15); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-background shadow-[0_4px_16px_rgba(224,64,160,0.15)] z-40 sticky">
<div class="flex justify-between items-center px-6 py-4 w-full">
<button class="text-on-surface-variant hover:scale-105 transition-transform duration-200 ease-out active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-lg font-display font-black text-primary tracking-tighter">Rastro</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-2xl mx-auto px-4 py-8 pb-32">
<!-- Search Input Section -->
<section class="mb-10">
<h2 class="font-headline font-bold text-2xl text-on-background mb-6">¿Dónde estás buscando?</h2>
<div class="relative group bouncy-hover">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary">search</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-background rounded-full py-4 pl-14 pr-12 focus:outline-none focus:ring-4 focus:ring-primary-container focus:border-primary shadow-pink transition-all font-body text-lg placeholder-outline" placeholder="Buscar ciudad, barrio o dirección..." type="text"/>
<button class="absolute inset-y-0 right-0 pr-5 flex items-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">mic</span>
</button>
</div>
<!-- Use Current Location Action -->
<button class="w-full mt-6 flex items-center p-4 bg-tertiary-fixed rounded-full shadow-blue bouncy-hover bouncy-active group transition-colors hover:bg-tertiary-fixed-dim">
<div class="bg-tertiary text-on-tertiary rounded-full p-2 mr-4 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined filled" data-icon="my_location">my_location</span>
</div>
<div class="text-left">
<p class="font-headline font-bold text-on-tertiary-fixed text-lg">Usar mi ubicación actual</p>
<p class="font-body text-sm text-on-tertiary-fixed-variant">Habilitar GPS para mayor precisión</p>
</div>
</button>
</section>
<!-- Bento Grid for Destinations -->
<section class="mb-10">
<h3 class="font-headline font-bold text-xl text-on-background mb-4">Departamentos Principales</h3>
<div class="grid grid-cols-2 gap-4">
<!-- La Paz -->
<button class="bg-surface-container-lowest rounded-DEFAULT p-4 border border-outline-variant shadow-purple bouncy-hover bouncy-active flex flex-col items-center justify-center gap-3 group relative overflow-hidden h-32">
<div class="absolute inset-0 bg-secondary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="bg-secondary-container text-on-secondary-container rounded-full p-3 group-hover:bg-secondary group-hover:text-on-secondary transition-colors z-10">
<span class="material-symbols-outlined" data-icon="landscape">landscape</span>
</div>
<span class="font-label font-bold text-on-background z-10">La Paz</span>
</button>
<!-- Santa Cruz -->
<button class="bg-surface-container-lowest rounded-DEFAULT p-4 border border-outline-variant shadow-pink bouncy-hover bouncy-active flex flex-col items-center justify-center gap-3 group relative overflow-hidden h-32">
<div class="absolute inset-0 bg-primary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="bg-primary-container text-on-primary-container rounded-full p-3 group-hover:bg-primary group-hover:text-on-primary transition-colors z-10">
<span class="material-symbols-outlined" data-icon="forest">forest</span>
</div>
<span class="font-label font-bold text-on-background z-10">Santa Cruz</span>
</button>
<!-- Cochabamba -->
<button class="bg-surface-container-lowest rounded-DEFAULT p-4 border border-outline-variant shadow-blue bouncy-hover bouncy-active flex flex-col items-center justify-center gap-3 group relative overflow-hidden col-span-2 h-24">
<div class="absolute inset-0 bg-tertiary/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="flex items-center gap-4 z-10">
<div class="bg-tertiary-container text-on-tertiary-container rounded-full p-3 group-hover:bg-tertiary group-hover:text-on-tertiary transition-colors">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
</div>
<span class="font-label font-bold text-on-background text-lg">Cochabamba</span>
</div>
</button>
</div>
</section>
<!-- Recent Searches List -->
<section>
<div class="flex justify-between items-end mb-4">
<h3 class="font-headline font-bold text-xl text-on-background">Búsquedas Recientes</h3>
<button class="text-secondary font-label font-bold text-sm hover:text-secondary-fixed-dim transition-colors">Limpiar</button>
</div>
<ul class="flex flex-col gap-3">
<li class="bg-surface-container-lowest rounded-DEFAULT border border-surface-variant p-4 flex items-center justify-between bouncy-hover cursor-pointer group hover:border-outline-variant hover:shadow-sm transition-all">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline group-hover:text-secondary transition-colors" data-icon="history">history</span>
<div>
<p class="font-body font-medium text-on-background">Sopocachi</p>
<p class="font-body text-sm text-on-surface-variant">La Paz</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="north_west">north_west</span>
</li>
<li class="bg-surface-container-lowest rounded-DEFAULT border border-surface-variant p-4 flex items-center justify-between bouncy-hover cursor-pointer group hover:border-outline-variant hover:shadow-sm transition-all">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-outline group-hover:text-secondary transition-colors" data-icon="history">history</span>
<div>
<p class="font-body font-medium text-on-background">Equipetrol</p>
<p class="font-body text-sm text-on-surface-variant">Santa Cruz de la Sierra</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="north_west">north_west</span>
</li>
</ul>
</section>
</main>
<!-- BottomNavBar -->
<!-- Suppressed: This is a search/transactional screen implying a temporary departure from the main flow. -->
</body></html>
