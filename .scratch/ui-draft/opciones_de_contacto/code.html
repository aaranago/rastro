<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Opciones de Contacto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#f080c0",
                        "tertiary-container": "#40c0ee",
                        "surface-bright": "#fef7ff",
                        "on-error-container": "#9b1c1c",
                        "error": "#e53e3e",
                        "primary": "#e040a0",
                        "surface-container-low": "#fbf2fb",
                        "on-secondary-fixed": "#1a1030",
                        "tertiary-fixed": "#c8eaff",
                        "outline": "#907898",
                        "primary-fixed": "#ffd6ee",
                        "on-surface-variant": "#604868",
                        "on-background": "#2e1a28",
                        "surface-variant": "#f2e8f2",
                        "secondary-fixed-dim": "#c8a8e8",
                        "error-container": "#ffe8e8",
                        "on-secondary-container": "#2e2040",
                        "outline-variant": "#dcc8e0",
                        "tertiary-fixed-dim": "#80d0f0",
                        "on-tertiary-fixed": "#001a33",
                        "secondary": "#7c52aa",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#e040a0",
                        "on-primary": "#ffffff",
                        "surface-dim": "#e0d6e0",
                        "on-tertiary-container": "#00334d",
                        "tertiary": "#0096cc",
                        "inverse-on-surface": "#fef7ff",
                        "on-surface": "#2e1a28",
                        "secondary-fixed": "#eedcff",
                        "on-secondary": "#ffffff",
                        "background": "#fef7ff",
                        "secondary-container": "#eedcff",
                        "surface": "#fef7ff",
                        "surface-container-highest": "#ece2ec",
                        "on-secondary-fixed-variant": "#4a3068",
                        "on-primary-fixed-variant": "#a02070",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#f0a0cc",
                        "surface-container": "#f8eef8",
                        "inverse-primary": "#f0a0cc",
                        "inverse-surface": "#2e1a28",
                        "on-tertiary-fixed-variant": "#005580",
                        "on-primary-fixed": "#3d0028",
                        "surface-container-high": "#f2e8f2",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#2e1a28"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["DM Sans", "sans-serif"],
                        "display": ["DM Sans", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"],
                        "label": ["DM Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'DM Sans', sans-serif; }
        .bouncy-hover { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease; }
        .bouncy-hover:hover { transform: scale(1.03); }
        .bouncy-active:active { transform: scale(0.95); transition: transform 0.1s; }
        
        /* Custom radio styling */
        .candy-radio {
            appearance: none;
            width: 1.5rem;
            height: 1.5rem;
            border: 2px solid #907898;
            border-radius: 50%;
            outline: none;
            transition: all 0.2s ease-in-out;
            position: relative;
        }
        .candy-radio:checked {
            border-color: #e040a0;
            background-color: #fef7ff;
        }
        .candy-radio:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0.75rem;
            height: 0.75rem;
            background-color: #e040a0;
            border-radius: 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen flex flex-col overflow-hidden max-w-md mx-auto relative shadow-2xl">
<!-- Top Navigation (Transactional) -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-surface z-10">
<button class="material-symbols-outlined text-primary text-2xl bouncy-hover bouncy-active">arrow_back</button>
<div class="flex space-x-1 items-center">
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim"></div>
<div class="w-2 h-2 rounded-full bg-primary-fixed-dim"></div>
<div class="w-2 h-2 rounded-full bg-primary w-4 transition-all duration-300"></div>
</div>
<button class="material-symbols-outlined text-on-surface-variant text-2xl bouncy-hover bouncy-active">close</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-6 pt-4 pb-24 scrollbar-hide">
<div class="mb-8">
<h1 class="font-display text-3xl font-bold tracking-tight text-primary mb-2">Opciones de Contacto</h1>
<p class="text-on-surface-variant text-sm">¿Cómo prefieres que te contacten si encuentran a tu mascota?</p>
</div>
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_16px_rgba(224,64,160,0.1)] mb-8 flex items-start space-x-3 border border-surface-container-highest">
<span class="material-symbols-outlined text-tertiary mt-0.5">security</span>
<p class="text-xs text-on-surface-variant leading-relaxed">
                Tu información de contacto se mantendrá privada y <strong class="text-primary font-bold">solo será visible</strong> para la persona que reporte un hallazgo de tu mascota.
            </p>
</div>
<div class="space-y-4">
<!-- Option 1: Chat en Rastro -->
<label class="block relative group cursor-pointer">
<input checked="" class="peer sr-only" name="contact_method" onchange="toggleWhatsAppInput()" type="radio" value="chat"/>
<div class="bg-surface-container-lowest rounded-xl p-5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed shadow-[0_4px_16px_rgba(124,82,170,0.05)] peer-checked:shadow-[0_4px_16px_rgba(224,64,160,0.15)] transition-all duration-300 bouncy-hover flex items-center justify-between">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">forum</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-lg">Chat en Rastro</h3>
<p class="text-xs text-on-surface-variant">Mensajes seguros en la app</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="w-3 h-3 rounded-full bg-surface hidden peer-checked:block"></div>
</div>
<!-- Custom radio visual overlay -->
<div class="absolute right-5 w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center transition-colors duration-200 group-hover:border-primary peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 transition-opacity duration-200 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- Option 2: WhatsApp -->
<label class="block relative group cursor-pointer">
<input class="peer sr-only" name="contact_method" onchange="toggleWhatsAppInput()" type="radio" value="whatsapp"/>
<div class="bg-surface-container-lowest rounded-xl p-5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-fixed shadow-[0_4px_16px_rgba(124,82,170,0.05)] peer-checked:shadow-[0_4px_16px_rgba(224,64,160,0.15)] transition-all duration-300 bouncy-hover flex items-center justify-between">
<div class="flex items-center space-x-4">
<div class="w-12 h-12 rounded-full bg-surface-variant text-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<div>
<h3 class="font-bold text-on-surface text-lg">WhatsApp</h3>
<p class="text-xs text-on-surface-variant">Contacto directo y rápido</p>
</div>
</div>
<!-- Custom radio visual overlay -->
<div class="absolute right-5 w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center transition-colors duration-200 group-hover:border-primary peer-checked:border-primary">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 transition-opacity duration-200 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- Conditional WhatsApp Input -->
<div class="hidden overflow-hidden transition-all duration-300 transform origin-top pt-2" id="whatsapp-input-container">
<div class="bg-surface-container-lowest p-5 rounded-xl shadow-sm border border-surface-container-high">
<label class="block text-sm font-medium text-on-surface mb-2">Número de teléfono</label>
<div class="flex relative">
<span class="inline-flex items-center px-4 rounded-l-full border border-r-0 border-outline-variant bg-surface-variant text-on-surface-variant text-sm font-medium">
                            +52
                        </span>
<input class="flex-1 min-w-0 block w-full px-4 py-3 rounded-none rounded-r-full border-outline-variant focus:ring-primary focus:border-primary text-on-surface bg-surface-bright placeholder-outline transition-all duration-200" placeholder="123 456 7890" type="tel"/>
<span class="material-symbols-outlined absolute right-4 top-3.5 text-primary opacity-0 transition-opacity duration-200 input-check">check_circle</span>
</div>
<p class="mt-2 text-xs text-on-surface-variant flex items-center">
<span class="material-symbols-outlined text-xs mr-1">info</span>
                        Asegúrate de incluir tu lada.
                    </p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent pb-8">
<button class="w-full bg-primary text-on-primary font-bold text-lg py-4 rounded-full shadow-[0_8px_24px_rgba(224,64,160,0.3)] bouncy-hover bouncy-active flex items-center justify-center space-x-2">
<span>Publicar Alerta</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
<script>
        function toggleWhatsAppInput() {
            const isWhatsApp = document.querySelector('input[name="contact_method"]:checked').value === 'whatsapp';
            const container = document.getElementById('whatsapp-input-container');
            
            if (isWhatsApp) {
                container.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating opacity/transform if needed
                setTimeout(() => {
                    container.classList.add('opacity-100', 'translate-y-0');
                    container.classList.remove('opacity-0', '-translate-y-4');
                }, 10);
            } else {
                container.classList.add('hidden');
            }
        }
    </script>
</body></html>
