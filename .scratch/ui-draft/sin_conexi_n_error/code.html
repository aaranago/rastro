<style>
        body { font-family: 'DM Sans', sans-serif; }
        .bouncy-hover:hover { transform: scale(1.03); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tinted-shadow-primary { box-shadow: 0 8px 24px rgba(224, 64, 160, 0.25); }
        .floating-animation { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .pulse-soft { animation: softPulse 3s infinite; }
        @keyframes softPulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-bright text-on-surface h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-4 h-16 w-full z-50 bg-background dark:bg-background shadow-sm shadow-[rgba(224,64,160,0.05)]">
<button class="w-10 h-10 flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="pets" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pets</span>
</button>
<h1 class="text-2xl font-black text-primary dark:text-primary-fixed-dim tracking-tight font-headline">Rastro</h1>
<button class="w-10 h-10 flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:scale-105 transition-transform duration-200 active:scale-95">
<span class="material-symbols-outlined" data-icon="search" data-weight="fill" style="font-variation-settings: 'FILL' 1;">search</span>
</button>
</header>
<!-- Main Canvas (Error State) -->
<main class="flex-1 overflow-y-auto flex flex-col items-center justify-center px-6 pb-24 relative">
<!-- Background decorative elements -->
<div class="absolute top-1/4 left-4 w-16 h-16 bg-secondary-fixed opacity-40 rounded-full blur-xl pulse-soft"></div>
<div class="absolute bottom-1/3 right-8 w-24 h-24 bg-primary-fixed opacity-30 rounded-full blur-2xl pulse-soft" style="animation-delay: 1s;"></div>
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-tertiary-fixed opacity-20 rounded-full blur-3xl -z-10"></div>
<!-- Illustration Container -->
<div class="relative w-64 h-64 mb-8 floating-animation">
<div class="absolute inset-0 bg-primary-container opacity-20 rounded-full blur-2xl"></div>
<img alt="Mascota confundida sin conexión" class="w-full h-full object-contain relative z-10 drop-shadow-[0_10px_20px_rgba(224,64,160,0.15)]" data-alt="A playful and vibrant vector illustration of a confused cartoon dog with a magnifying glass. The dog looks puzzled, perhaps scratching its head. The style is flat, modern, and joyful pop, using hot pinks, sky blues, and warm purples against a very light pink-white background. The aesthetic is cute, energetic, and suitable for a pet-finding app error screen." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC05CEi3nQmQSjxNUJFw4Q9U_848FNcrAQRyfNk0RwXswRd_htE2ur1icwHGLHWu4J36OQBlf1bdEvxtTIdntm0UajH1kRkdatwUG3kno-d1iUL6ixRPrK8lLbySpOjY1Zc6O2xeYHd1JvzHjW2Z8jT6fNadJUZ7gDBa5y7qVz6ZBKlmT2noFvA2Pqsg5OhLKEAnIPfmrnP_iZhZSkHeUtdwZuGGUCKInfaAsYJhoz1pojN9VwQUn5ZwTbXkHLBtjgDaQ4PlBCinz0"/>
<!-- Disconnected icon badge -->
<div class="absolute bottom-4 right-4 w-12 h-12 bg-surface rounded-full flex items-center justify-center shadow-lg z-20 bouncy-hover">
<div class="w-10 h-10 bg-error-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-error" data-icon="wifi_off">wifi_off</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center max-w-sm mb-10 relative z-10">
<h2 class="font-headline text-3xl font-bold text-on-surface mb-3 tracking-tight">¡Oh no! Sin conexión</h2>
<p class="font-body text-base text-on-surface-variant leading-relaxed px-4">
                Parece que no tienes internet. Revisa tu conexión para seguir ayudando a mascotas.
            </p>
</div>
<!-- Primary Action -->
<button class="bg-primary text-on-primary font-label text-lg font-bold py-4 px-10 rounded-full w-full max-w-xs bouncy-hover tinted-shadow-primary flex items-center justify-center gap-2 active:scale-95 transition-all relative z-10 overflow-hidden group">
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
<span>Reintentar</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-6 pt-3 bg-surface dark:bg-surface-container-low shadow-[0_-4px_16px_rgba(224,64,160,0.15)] rounded-t-xl hidden md:hidden block">
<!-- We suppress the active state highlight as this is a disconnected error screen, not actively browsing a tab -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span class="font-label text-xs font-medium">Cerca</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-label text-xs font-medium">Actividad</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-label text-xs font-medium">Recursos</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-variant dark:hover:bg-surface-container-highest transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label text-xs font-medium">Perfil</span>
</button>
</nav>
<!-- Mobile BottomNav (Visible on mobile, hidden on md+) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 pb-6 pt-3 bg-surface shadow-[0_-4px_20px_rgba(224,64,160,0.08)] rounded-t-2xl">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-variant transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span class="font-label text-[11px] font-medium">Cerca</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-variant transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-label text-[11px] font-medium">Actividad</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-variant transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-label text-[11px] font-medium">Recursos</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 hover:bg-surface-variant transition-colors rounded-xl">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label text-[11px] font-medium">Perfil</span>
</button>
</nav>
<script>
        // Simple micro-interaction for the retry button
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const icon = this.querySelector('.material-symbols-outlined');
            icon.style.transform = 'rotate(360deg)';
            icon.style.transition = 'transform 0.5s ease-in-out';
            
            setTimeout(() => {
                icon.style.transform = 'rotate(0deg)';
                icon.style.transition = 'none';
            }, 500);
        });
    </script>
</body></html>
