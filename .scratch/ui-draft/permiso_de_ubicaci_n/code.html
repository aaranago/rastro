        body { font-family: 'DM Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen relative overflow-x-hidden text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Atmospheric Background Blobs for Candy Vibe -->
<div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-primary-container/20 rounded-full blur-3xl z-0 pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-tertiary-container/20 rounded-full blur-3xl z-0 pointer-events-none"></div>
<!-- TopAppBar -->
<!-- Applying style_ classes literally from JSON -->
<header class="bg-background dark:bg-background docked full-width top-0 bg-background dark:bg-background shadow-[0_4px_16px_rgba(224,64,160,0.15)] flex justify-between items-center px-6 py-4 w-full fixed z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary" data-icon="pets" style="font-variation-settings: 'FILL' 1;">pets</span>
<span class="text-headline-lg font-display font-black text-primary dark:text-primary tracking-tighter text-2xl">Rastro</span>
</div>
<button class="hover:scale-105 transition-transform duration-200 ease-out active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant text-on-surface-variant dark:text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas (Navigation Shell Suppressed due to linear/onboarding intent) -->
<main class="relative z-10 pt-28 pb-12 px-6 min-h-screen flex flex-col items-center justify-center max-w-md mx-auto">
<!-- Illustration Container -->
<div class="w-full aspect-square mb-8 relative rounded-xl overflow-hidden shadow-[0_16px_32px_rgba(124,82,170,0.15)] bg-surface-container-lowest border-4 border-surface-container-low transition-transform duration-500 ease-out hover:-translate-y-2 group">
<div class="absolute inset-0 bg-gradient-to-tr from-primary-fixed/30 to-secondary-fixed/30 mix-blend-multiply z-10"></div>
<!-- High-quality placeholder image with detailed prompt -->
<img class="w-full h-full object-cover relative z-0 scale-105 group-hover:scale-110 transition-transform duration-700 ease-out" data-alt="A vibrant, joyful 3D pop-art style illustration of a cute cartoon dog and cat standing together, eagerly looking at a brightly colored, stylized map spread out on the ground. A large, glowing hot pink location pin hovers above the map. The color palette features saturated hot pinks, playful purples, and sky blue accents against a pristine, warm light pink-white background. The characters have soft, pill-shaped forms with bouncy energy and soft, high-key studio lighting casting gentle tinted shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-BG2Xn57P-vCxshYouev4wU1QbmoPRIQkKfs-lzm5YCrJ_LHzozyfz98IEYlTvm4Ofio19gAqXvqN9WmAvm-WOR0GGm_j8nVwNvUc0Fq8Gy7EbuGodMFD5V4KJajPPFUHoLJNCP-g8vKliH1XMcYu6kMz76cKvBSNgPvTt3fvM5v0AprAagnr3A3E3vSnzxR6b1c31fVcFFfG0OZWL6Zz2EQ_XKa45GTbsU_q2jMzRQ-ylxVmJ1-gJ3IOj0hgv2WekBAe4ArMsfI"/>
</div>
<!-- Text Content -->
<div class="text-center mb-10">
<h1 class="font-display font-bold text-3xl md:text-4xl tracking-tight mb-4 text-on-background">
                Encuentra a tus amigos
            </h1>
<p class="font-body text-lg text-on-surface-variant leading-relaxed px-2">
                Rastro necesita acceso a tu ubicación para mostrarte mascotas perdidas cerca de ti y enviarte alertas urgentes de tu vecindario.
            </p>
</div>
<!-- Actions Container -->
<div class="flex flex-col gap-4 w-full">
<!-- Primary Action (Candy Style: Pill, Solid, Tinted Shadow, Bouncy) -->
<button class="w-full bg-primary text-on-primary font-label font-bold text-lg py-4 px-8 rounded-full shadow-[0_4px_16px_rgba(224,64,160,0.25)] hover:scale-[1.03] hover:shadow-[0_8px_24px_rgba(224,64,160,0.35)] active:scale-95 transition-all duration-300 ease-out flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined group-hover:animate-bounce" style="font-variation-settings: 'FILL' 1;">location_on</span>
                Permitir ubicación
            </button>
<!-- Secondary Action -->
<button class="w-full text-secondary font-label font-bold text-base py-3 px-6 rounded-full hover:bg-secondary-container/40 active:scale-95 transition-all duration-200">
                Ingresar ubicación manualmente
            </button>
</div>
</main>
</body></html>
